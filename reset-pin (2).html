<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Change Payment PIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            touch-action: manipulation;
        }
        
        .pin-input {
            transition: all 0.2s ease;
        }

        .pin-input.active {
            border-color: #2DD4BF; /* Teal-400 */
            background-color: #F0FDFA;
            box-shadow: 0 0 0 2px rgba(45, 212, 191, 0.2);
        }

        .keypad-btn:active {
            background-color: #f3f4f6;
        }

        /* Hide number input spinner */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-screen w-full flex justify-center items-center overflow-hidden">

    <!-- Mobile Container – ensures proper sizing on all devices -->
    <div class="w-full h-full max-w-md bg-white flex flex-col relative shadow-xl">
        
        <!-- Header - reduced top padding -->
        <div class="px-6 pt-6 pb-2 flex items-center">
            <button class="p-2 -ml-2 text-gray-600 hover:bg-gray-100 rounded-full transition" id="backBtn">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <h1 class="ml-2 text-2xl font-bold text-gray-900">Change Payment PIN</h1>
        </div>

        <!-- Main content area (takes remaining space, no scrolling needed) -->
        <div class="flex-1 flex flex-col px-6 pb-2">
            <p class="text-gray-500 text-sm leading-relaxed mb-4">
                The Payment PIN must contain number which cannot be repeated or consecutive.
            </p>

            <!-- New PIN Section -->
            <div class="mb-4">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-gray-700 font-medium text-base">New Payment PIN</label>
                    <button id="toggleVisibility" class="text-gray-400 hover:text-gray-600 transition">
                        <!-- Eye Icon (Hidden State) -->
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                        </svg>
                        <!-- Eye Slash Icon (Visible State - Hidden by default) -->
                        <svg id="eye-slash-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
                <!-- Smaller PIN boxes: fixed width and centered -->
                <div class="flex justify-center gap-3" id="new-pin-container">
                    <!-- Inputs generated by JS -->
                </div>
                <p id="new-pin-error" class="text-red-500 text-xs mt-2 h-4 hidden">PIN cannot be repeated or consecutive</p>
            </div>

            <!-- Confirm PIN Section -->
            <div class="mb-5">
                <label class="text-gray-700 font-medium text-base mb-2 block">Confirm new Payment PIN</label>
                <div class="flex justify-center gap-3" id="confirm-pin-container">
                    <!-- Inputs generated by JS -->
                </div>
                <p id="confirm-pin-error" class="text-red-500 text-xs mt-2 h-4 hidden">PINs do not match</p>
            </div>

            <!-- Confirm Button -->
            <button id="confirm-btn" class="w-full bg-teal-200 text-white font-semibold py-3 rounded-full text-lg shadow-sm transition-all duration-300 opacity-50 cursor-not-allowed" disabled>
                Confirm
            </button>
            
            <!-- Spacer to push keypad down -->
            <div class="flex-1 min-h-[1rem]"></div>
        </div>

        <!-- Keypad Area - smaller buttons, less padding -->
        <div class="bg-gray-50 border-t border-gray-100 pb-4 pt-2 px-4">
            <div class="flex justify-between items-center px-2 mb-2">
                <div class="flex items-center text-gray-500 text-sm font-medium">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-green-500 mr-1.5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                    OPay Secure Numeric Keypad
                </div>
                <button class="text-teal-500 font-medium text-sm hover:text-teal-600" onclick="handleDone()">Done</button>
            </div>
            
            <div class="grid grid-cols-3 gap-2">
                <!-- Row 1 -->
                <button class="keypad-btn bg-white h-14 rounded-lg text-2xl font-medium text-gray-800 shadow-sm border border-gray-100 flex items-center justify-center" onclick="handleInput('1')">1</button>
                <button class="keypad-btn bg-white h-14 rounded-lg text-2xl font-medium text-gray-800 shadow-sm border border-gray-100 flex items-center justify-center" onclick="handleInput('2')">2</button>
                <button class="keypad-btn bg-white h-14 rounded-lg text-2xl font-medium text-gray-800 shadow-sm border border-gray-100 flex items-center justify-center" onclick="handleInput('3')">3</button>
                <!-- Row 2 -->
                <button class="keypad-btn bg-white h-14 rounded-lg text-2xl font-medium text-gray-800 shadow-sm border border-gray-100 flex items-center justify-center" onclick="handleInput('4')">4</button>
                <button class="keypad-btn bg-white h-14 rounded-lg text-2xl font-medium text-gray-800 shadow-sm border border-gray-100 flex items-center justify-center" onclick="handleInput('5')">5</button>
                <button class="keypad-btn bg-white h-14 rounded-lg text-2xl font-medium text-gray-800 shadow-sm border border-gray-100 flex items-center justify-center" onclick="handleInput('6')">6</button>
                <!-- Row 3 -->
                <button class="keypad-btn bg-white h-14 rounded-lg text-2xl font-medium text-gray-800 shadow-sm border border-gray-100 flex items-center justify-center" onclick="handleInput('7')">7</button>
                <button class="keypad-btn bg-white h-14 rounded-lg text-2xl font-medium text-gray-800 shadow-sm border border-gray-100 flex items-center justify-center" onclick="handleInput('8')">8</button>
                <button class="keypad-btn bg-white h-14 rounded-lg text-2xl font-medium text-gray-800 shadow-sm border border-gray-100 flex items-center justify-center" onclick="handleInput('9')">9</button>
                <!-- Row 4 -->
                <div></div> <!-- Empty spacer -->
                <button class="keypad-btn bg-white h-14 rounded-lg text-2xl font-medium text-gray-800 shadow-sm border border-gray-100 flex items-center justify-center" onclick="handleInput('0')">0</button>
                <button class="keypad-btn bg-white h-14 rounded-lg flex items-center justify-center shadow-sm border border-gray-100 text-gray-700" onclick="handleBackspace()">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Success Modal Overlay (modified to redirect) -->
        <div id="success-modal" class="absolute inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden fade-in">
            <div class="bg-white rounded-2xl p-8 w-3/4 max-w-xs text-center shadow-2xl transform transition-all scale-100">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-gray-800 mb-2">Success!</h3>
                <p class="text-gray-500 text-sm mb-6">Your payment PIN has been changed successfully.</p>
                <button onclick="closeModalAndGoBack()" class="w-full bg-teal-500 text-white font-semibold py-3 rounded-full hover:bg-teal-600 transition">OK</button>
            </div>
        </div>

    </div>

    <script>
        // State
        let newPin = "";
        let confirmPin = "";
        let isConfirming = false; // false = entering new pin, true = entering confirm pin
        let isVisible = false;

        // DOM Elements
        const newPinContainer = document.getElementById('new-pin-container');
        const confirmPinContainer = document.getElementById('confirm-pin-container');
        const toggleBtn = document.getElementById('toggleVisibility');
        const eyeIcon = document.getElementById('eye-icon');
        const eyeSlashIcon = document.getElementById('eye-slash-icon');
        const confirmBtn = document.getElementById('confirm-btn');
        const newPinError = document.getElementById('new-pin-error');
        const confirmPinError = document.getElementById('confirm-pin-error');
        const successModal = document.getElementById('success-modal');
        const backBtn = document.getElementById('backBtn');

        // Initialize Inputs – smaller boxes: w-14 (3.5rem) for a compact size
        function createInputs(containerId, count) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const input = document.createElement('div');
                input.className = `pin-input w-14 h-14 bg-gray-50 rounded-xl border border-gray-200 flex items-center justify-center text-2xl font-semibold text-gray-800 cursor-pointer`;
                input.dataset.index = i;
                input.onclick = () => focusInput(containerId, i);
                container.appendChild(input);
            }
        }

        createInputs('new-pin-container', 4);
        createInputs('confirm-pin-container', 4);

        // Focus Logic
        function focusInput(containerId, index) {
            // Clear all active states
            document.querySelectorAll('.pin-input').forEach(el => el.classList.remove('active'));
            
            // Set active state
            const inputs = document.getElementById(containerId).children;
            if(inputs[index]) {
                inputs[index].classList.add('active');
            }

            // Update state based on which container was clicked
            if (containerId === 'new-pin-container') {
                isConfirming = false;
            } else {
                isConfirming = true;
            }
            
            renderInputs();
        }

        // Render Inputs (Dots or Numbers)
        function renderInputs() {
            // Render New Pin
            const newInputs = document.getElementById('new-pin-container').children;
            for (let i = 0; i < 4; i++) {
                const el = newInputs[i];
                el.classList.remove('active'); // Reset active
                
                if (i < newPin.length) {
                    el.textContent = isVisible ? newPin[i] : '•';
                    el.classList.add('bg-white', 'border-gray-300');
                } else {
                    el.textContent = '';
                    el.classList.remove('bg-white', 'border-gray-300');
                    if (!isConfirming && i === newPin.length) {
                        el.classList.add('active');
                    }
                }
            }

            // Render Confirm Pin
            const confirmInputs = document.getElementById('confirm-pin-container').children;
            for (let i = 0; i < 4; i++) {
                const el = confirmInputs[i];
                el.classList.remove('active');

                if (i < confirmPin.length) {
                    el.textContent = isVisible ? confirmPin[i] : '•';
                    el.classList.add('bg-white', 'border-gray-300');
                } else {
                    el.textContent = '';
                    el.classList.remove('bg-white', 'border-gray-300');
                    if (isConfirming && i === confirmPin.length) {
                        el.classList.add('active');
                    }
                }
            }

            // Validate Button State
            if (newPin.length === 4 && confirmPin.length === 4) {
                confirmBtn.disabled = false;
                confirmBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-teal-200');
                confirmBtn.classList.add('bg-teal-400', 'hover:bg-teal-500', 'shadow-md');
            } else {
                confirmBtn.disabled = true;
                confirmBtn.classList.add('opacity-50', 'cursor-not-allowed', 'bg-teal-200');
                confirmBtn.classList.remove('bg-teal-400', 'hover:bg-teal-500', 'shadow-md');
            }
        }

        // Input Handling
        function handleInput(num) {
            // Clear errors when typing
            newPinError.classList.add('hidden');
            confirmPinError.classList.add('hidden');

            if (!isConfirming) {
                if (newPin.length < 4) {
                    newPin += num;
                    if (newPin.length === 4) {
                        // Validate New Pin Rules immediately upon completion
                        if (!validatePin(newPin)) {
                            newPinError.classList.remove('hidden');
                            // Auto-clear after a short delay for better UX
                            setTimeout(() => {
                                newPin = "";
                                newPinError.classList.add('hidden');
                                renderInputs();
                            }, 1000);
                            return; 
                        }
                        // If valid, switch to confirm mode
                        isConfirming = true;
                    }
                }
            } else {
                if (confirmPin.length < 4) {
                    confirmPin += num;
                    if (confirmPin.length === 4) {
                        if (newPin !== confirmPin) {
                            confirmPinError.textContent = "PINs do not match";
                            confirmPinError.classList.remove('hidden');
                            setTimeout(() => {
                                confirmPin = "";
                                isConfirming = false; // Go back to new pin
                                confirmPinError.classList.add('hidden');
                                renderInputs();
                            }, 1000);
                            return;
                        }
                    }
                }
            }
            renderInputs();
        }

        function handleBackspace() {
            newPinError.classList.add('hidden');
            confirmPinError.classList.add('hidden');

            if (isConfirming) {
                if (confirmPin.length > 0) {
                    confirmPin = confirmPin.slice(0, -1);
                } else {
                    // If confirm pin is empty, go back to new pin editing
                    isConfirming = false;
                }
            } else {
                if (newPin.length > 0) {
                    newPin = newPin.slice(0, -1);
                }
            }
            renderInputs();
        }

        function handleDone() {
            if (newPin.length === 4 && confirmPin.length === 4 && newPin === confirmPin) {
                submitForm();
            } else if (newPin.length === 4 && confirmPin.length === 0) {
                isConfirming = true;
                renderInputs();
            }
        }

        // Validation Logic
        function validatePin(pin) {
            if (pin.length !== 4) return false;

            // 1. Check for repeated numbers (e.g., 1123)
            const uniqueChars = new Set(pin.split(''));
            if (uniqueChars.size !== pin.length) {
                return false;
            }

            // 2. Check for consecutive numbers (e.g., 1234, 4321)
            const nums = pin.split('').map(Number);
            let isAscending = true;
            let isDescending = true;

            for (let i = 0; i < nums.length - 1; i++) {
                if (nums[i+1] !== nums[i] + 1) isAscending = false;
                if (nums[i+1] !== nums[i] - 1) isDescending = false;
            }

            if (isAscending || isDescending) {
                return false;
            }

            return true;
        }

        // Toggle Visibility
        toggleBtn.addEventListener('click', () => {
            isVisible = !isVisible;
            if (isVisible) {
                eyeIcon.classList.add('hidden');
                eyeSlashIcon.classList.remove('hidden');
            } else {
                eyeIcon.classList.remove('hidden');
                eyeSlashIcon.classList.add('hidden');
            }
            renderInputs();
        });

        // Submit - save new PIN to localStorage
        function submitForm() {
            // Save new PIN
            localStorage.setItem('userPIN', newPin);
            // Reset attempts and lock when PIN is changed
            localStorage.setItem('pinAttempts', '0');
            localStorage.removeItem('pinLockUntil');
            successModal.classList.remove('hidden');
        }

        function closeModalAndGoBack() {
            successModal.classList.add('hidden');
            // Redirect back to transfer page (adjust URL if needed)
            window.location.href = '/nextfulls.html'; // or appropriate path
        }

        // Back button
        backBtn.addEventListener('click', () => {
            window.history.back();
        });

        // Initial Render
        renderInputs();
        // Set initial focus
        focusInput('new-pin-container', 0);
    </script>
    <script src="/pwa-check.js"></script>
</body>
</html>
