<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPay Transaction Details</title>
    <style>
        :root {
            --primary-green: #00C087;
            --bg-color: #F5F7FA;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-secondary: #6B7280;
            --text-light: #9CA3AF;
            --border-color: #E5E7EB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 16px;
            background-color: var(--card-bg);
            flex-shrink: 0;
        }

        .header-left, .header-right {
            width: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-title {
            display: flex;
            font-size: 16px;
            padding-right: 150px;
            font-weight: 400;
            color: var(--text-main);
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 8px;
            margin-top: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            margin: 12px 16px;
            padding: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .receipt-header {
            text-align: center;
            margin-bottom: 0;
        }

        .bank-logo-container {
            width: 40px;
            height: 40px;
            margin: -30px auto 16px;
            border-radius: 50%;
            overflow: hidden;
            background: #FFFFFF;
            border: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }

        .bank-logo {
            width: 40px;
            height: auto;
            object-fit: contain;
        }

        .recipient-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .amount {
            font-size: 30px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .status-success {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--primary-green);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 0;
        }

        .status-success img {
            width: 14px;
            height: 14px;
            object-fit: contain;
        }

        .details-header {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
            color: var(--text-main);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
            font-size: 12px;
        }

        .detail-label {
            color: var(--text-secondary);
            width: 40%;
        }

        .detail-value-container {
            width: 60%;
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        
        .detail-value-main {
            color: var(--text-main);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            word-break: break-word;
            text-align: right;
        }

        .detail-sub {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
            text-align: right;
        }

        .copy-icon {
            color: var(--text-light);
            cursor: pointer;
            width: 13px;
            height: 13px;
            flex-shrink: 0;
        }

        .chevron-right {
            width: 13px;
            height: 13px;
            color: var(--text-light);
            flex-shrink: 0;
        }

        .more-actions-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            margin: 12px 16px;
            padding: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .actions-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .more-actions-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .action-item {
            font-size: 14px;
            color: var(--primary-green);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .action-item svg {
            width: 16px;
            height: 16px;
            stroke: var(--primary-green);
            fill: none;
            stroke-width: 2;
        }

        .bottom-buttons {
            display: flex;
            gap: 10px;
            padding: 16px;
            background-color: var(--bg-color);
            flex-shrink: 0;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-align: center;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-outline {
            background-color: rgba(0, 192, 135, 0.1);
            color: var(--primary-green);
        }

        .btn-primary {
            background-color: var(--primary-green);
            color: white;
        }

        .copy-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 100px;
            background-color: #1e1e1e;
            border-radius: 16px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .copy-popup svg {
            width: 30px;
            height: 30px;
            stroke: white;
            fill: none;
            margin-bottom: 8px;
        }

        .copy-popup span {
            color: white;
            font-size: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-left" onclick="history.back()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1F2937" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
            </div>
            <div class="header-title">Transaction Details</div>
            <div class="header-right">
                <img src="images/history/supp.png" alt="support" width="60" height="50" style="display:block;">
            </div>
        </header>

        <div class="scroll-area">
            <!-- Main Receipt Card -->
            <div class="card">
                <div class="receipt-header">
                    <!-- Fixed OPay logo -->
                    <div class="bank-logo-container">
                        <img class="bank-logo" src="images/history/opay.png" alt="OPay">
                    </div>
                    
                    <div class="recipient-label" id="recipientName">Transfer to</div>
                    <div class="amount" id="amountDisplay">₦0.00</div>
                    <div class="status-success">
                        <img src="images/trans/pay_result_successful.png" alt="success">
                        Successful
                    </div>
                </div>
            </div>

            <!-- Details Card -->
            <div class="card">
                <div class="details-header">Transaction Details</div>
                
                <div class="detail-row">
                    <span class="detail-label">Recipient Details</span>
                    <div class="detail-value-container" id="recipientDetails">
                        <span style="color: var(--text-main); font-weight:500; font-size:12px;"></span>
                        <span class="detail-sub"></span>
                    </div>
                </div>

                <div class="detail-row">
                    <span class="detail-label">Transaction No.</span>
                    <div class="detail-value-main" id="transactionNumber">
                        <svg class="copy-icon" data-copy="transaction" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </div>
                </div>

                <div class="detail-row">
                    <span class="detail-label">Payment Method</span>
                    <div class="detail-value-main">
                        Wallet
                        <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </div>
                </div>

                <div class="detail-row">
                    <span class="detail-label">Transaction Date</span>
                    <div class="detail-value-main" id="transactionDate">
                    </div>
                </div>
                <!-- Session ID row removed as requested -->
            </div>

            <!-- More Actions -->
            <div class="more-actions-card">
                <div class="actions-title">More Actions</div>
                <div class="more-actions-row">
                    <div class="action-item" onclick="window.location.href='nextfulls.html'">
                        <svg width="20" height="20" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" stroke="#00C087" stroke-width="8" fill="none" />
                        <path d="M32 42H58L50 34" stroke="#00C087" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
                        <path d="M68 58H42L50 66" stroke="#00C087" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
                    </svg>
                        Transfer Again
                    </div>
                    <div class="action-item" onclick="window.location.href='records.html'">
                        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4v16h16V4H4z"/>
                            <line x1="8" y1="9" x2="16" y2="9"/>
                            <line x1="8" y1="13" x2="12" y2="13"/>
                        </svg>
                        View Records
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-buttons">
            <button class="btn btn-outline" onclick="window.location.href='report-issue.html'">Report Issue</button>
            <button class="btn btn-primary" onclick="shareReceipt()">Share Receipt</button>
        </div>
    </div>

    <div class="copy-popup" id="copyPopup">
        <svg viewBox="0 0 30 30">
            <circle cx="15" cy="15" r="12" stroke="white" stroke-width="2" fill="none" />
            <polyline points="8,15 13,20 22,10" stroke="white" stroke-width="2" fill="none" />
        </svg>
        <span>Copied successfully</span>
    </div>

    <script>
        (function() {
            const popup = document.getElementById('copyPopup');

            function showPopup() {
                popup.style.display = 'flex';
                setTimeout(() => {
                    popup.style.display = 'none';
                }, 1500);
            }

            function copyText(text) {
                navigator.clipboard.writeText(text).then(() => {
                    showPopup();
                }).catch(err => {
                    console.error('Copy failed', err);
                });
            }

            function getTextFromDetailValueMain(element) {
                const clone = element.cloneNode(true);
                const svgs = clone.querySelectorAll('svg');
                svgs.forEach(svg => svg.remove());
                return clone.textContent.trim();
            }

            function attachCopyIcons() {
                document.querySelectorAll('.copy-icon').forEach(icon => {
                    icon.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const parent = icon.closest('.detail-value-main');
                        if (parent) {
                            const textToCopy = getTextFromDetailValueMain(parent);
                            copyText(textToCopy);
                        }
                    });
                });
            }

            function formatTransactionDate(timestamp) {
                const date = new Date(timestamp);
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                const month = months[date.getMonth()];
                const day = date.getDate();
                const suffix = (day % 10 === 1 && day !== 11) ? 'st' : (day % 10 === 2 && day !== 12) ? 'nd' : (day % 10 === 3 && day !== 13) ? 'rd' : 'th';
                const year = date.getFullYear();
                const hh = String(date.getHours()).padStart(2, '0');
                const min = String(date.getMinutes()).padStart(2, '0');
                const ss = String(date.getSeconds()).padStart(2, '0');
                return `${month} ${day}${suffix}, ${year} ${hh}:${min}:${ss}`;
            }

            function formatCurrency(amount) {
                return new Intl.NumberFormat('en-NG', {
                    style: 'currency',
                    currency: 'NGN',
                    minimumFractionDigits: 2
                }).format(amount);
            }

            // Helper to parse displayed date string (if needed as fallback)
            function parseDisplayDate(dateStr) {
                const clean = dateStr.replace(/(\d+)(st|nd|rd|th)/, '$1');
                return new Date(clean).getTime();
            }

            // Generate a realistic transaction ID based on timestamp
            function generateTransactionId(timestamp) {
                const d = new Date(timestamp);
                const yy = d.getFullYear().toString().slice(-2);
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                const hh = String(d.getHours()).padStart(2, '0');
                const min = String(d.getMinutes()).padStart(2, '0');
                const ss = String(d.getSeconds()).padStart(2, '0');
                const random = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
                return `${yy}${mm}${dd}${hh}${min}${ss}${random}`;
            }

            // Load transaction data from viewTransaction first, then fallback to transfer.receipt
            function loadTransaction() {
                const viewData = localStorage.getItem('viewTransaction');
                if (viewData) {
                    try {
                        return JSON.parse(viewData);
                    } catch (e) {
                        console.error('Failed to parse viewTransaction', e);
                    }
                }
                const receiptData = localStorage.getItem('transfer.receipt');
                if (receiptData) {
                    try {
                        return JSON.parse(receiptData);
                    } catch (e) {
                        console.error('Failed to parse transfer.receipt', e);
                    }
                }
                return null;
            }

            const tx = loadTransaction();
            if (tx) {
                document.getElementById('recipientName').textContent = `Transfer to ${tx.accountname || 'Recipient'}`;
                const amountFormatted = formatCurrency(tx.amount || 0);
                document.getElementById('amountDisplay').textContent = amountFormatted;

                const recipientDetailsDiv = document.getElementById('recipientDetails');
                recipientDetailsDiv.innerHTML = `
                    <span style="color: var(--text-main); font-weight:500; font-size:12px;">${tx.accountname || 'Recipient'}</span>
                    <span class="detail-sub">${tx.bankname || 'OPay'} | ${tx.accountnumber || ''}</span>
                `;

                // Transaction No. – generate if missing
                let txId = tx.transactionId;
                if (!txId) {
                    const timestamp = tx.receivedTime || tx.paymentSuccessTime || tx.created_at || Date.now();
                    txId = generateTransactionId(timestamp);
                }
                document.getElementById('transactionNumber').innerHTML = `
                    ${txId}
                    <svg class="copy-icon" data-copy="transaction" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                `;

                const txDate = tx.receivedTime || tx.paymentSuccessTime || tx.created_at || Date.now();
                document.getElementById('transactionDate').textContent = formatTransactionDate(txDate);

                attachCopyIcons();
            } else {
                // Keep static demo data (already present in HTML) and attach copy icons
                attachCopyIcons();
            }

            // Share receipt function – collect displayed data and redirect to sign-receipt.html
            window.shareReceipt = function() {
                // Try to get the transaction object from localStorage again (in case it changed)
                const currentTx = loadTransaction();

                // If we have a valid transaction object, use it; otherwise extract from DOM
                if (currentTx) {
                    // Use the object directly – it already contains all needed fields
                    // Ensure we have a timestamp and generate missing transactionId
                    const receivedTime = currentTx.receivedTime || currentTx.paymentSuccessTime || currentTx.created_at || Date.now();
                    let transactionId = currentTx.transactionId;
                    if (!transactionId) {
                        transactionId = generateTransactionId(receivedTime);
                    }
                    const shareData = {
                        amount: currentTx.amount || 0,
                        accountname: currentTx.accountname || '',
                        bankname: currentTx.bankname || 'OPay',
                        accountnumber: currentTx.accountnumber || '',
                        transactionId: transactionId,
                        receivedTime: receivedTime,
                        paymentSuccessTime: currentTx.paymentSuccessTime || (receivedTime - 15000)
                    };
                    localStorage.setItem('shareReceiptData', JSON.stringify(shareData));
                    window.location.href = 'sign-receipt.html';
                    return;
                }

                // Fallback: extract from DOM
                const amountText = document.getElementById('amountDisplay').textContent;
                const amount = parseFloat(amountText.replace(/[₦,]/g, ''));

                const recipientFull = document.getElementById('recipientName').textContent;
                const accountname = recipientFull.replace('Transfer to ', '').trim();

                // Get bank name and account number from recipient details sub
                const recipientSubElem = document.querySelector('#recipientDetails .detail-sub');
                let bankname = 'OPay';
                let accountnumber = '';
                if (recipientSubElem) {
                    const subText = recipientSubElem.textContent;
                    if (subText.includes('|')) {
                        const parts = subText.split('|').map(s => s.trim());
                        bankname = parts[0];
                        accountnumber = parts[1].replace(/\s+/g, '');
                    } else {
                        accountnumber = subText;
                    }
                }

                // Transaction number – extract from DOM or generate
                const txElem = document.getElementById('transactionNumber');
                let transactionId = '';
                if (txElem) {
                    const raw = txElem.childNodes[0]?.nodeValue?.trim() || txElem.textContent.replace(/<svg.*<\/svg>/g, '').trim();
                    if (raw && raw !== 'N/A') {
                        transactionId = raw;
                    }
                }
                // If no transactionId, generate based on date
                const dateStr = document.getElementById('transactionDate').textContent;
                const receivedTime = dateStr ? parseDisplayDate(dateStr) : Date.now();
                if (!transactionId) {
                    transactionId = generateTransactionId(receivedTime);
                }

                const paymentSuccessTime = receivedTime - 15000;

                const shareData = {
                    amount: amount,
                    accountname: accountname,
                    bankname: bankname,
                    accountnumber: accountnumber,
                    transactionId: transactionId,
                    receivedTime: receivedTime,
                    paymentSuccessTime: paymentSuccessTime
                };

                localStorage.setItem('shareReceiptData', JSON.stringify(shareData));
                window.location.href = 'sign-receipt.html';
            };
        })();
    </script>
    <script src="/pwa-check.js"></script>
</body>
</html>
