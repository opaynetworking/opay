<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        /* Disable tap highlight on mobile */
        .my-div {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        :root {
            --bg-color: #F8F8FB;
            --text-color: #000000;
            --accent-color: #00B876;
            --card-bg: #FFFFFF;
            --secondary-text: #666666;
            --grey-text: #888888;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #FFFFFF;
                --accent-color: #00D88A;
                --card-bg: #1E1E1E;
                --secondary-text: #AAAAAA;
                --grey-text: #AAAAAA;
            }
            .banner {
                opacity: 0.9;
                filter: brightness(0.8);
            }
            .banner-secondary {
                opacity: 0.9;
                filter: brightness(0.8);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg-color);
            font-family: 'Inter', Arial, sans-serif;
            overflow-x: hidden;
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .scroll-container {
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 8px;
            width: 100%;
        }
        .done-text {
            align-self: flex-end;
            margin-right: 15px;
            font-size: 16px;
            color: var(--accent-color);
            font-weight: 500;
            margin-top: 5px;
            cursor: pointer;
        }
        lottie-player {
            margin-top: -17px;
            width: 100%;
            max-width: 400px;
            height: 130px;
        }
        .main-content {
            text-align: center;
            padding: 8px;
            width: 100%;
            max-width: 420px;
            transform: translateY(-40px);
        }
        .main-content h2 {
            font-size: 18px;
            margin: 8px 0;
            color: var(--text-color);
            font-weight: 400;
        }
        .main-content .amount {
            font-size: 25px;
            font-weight: 500;
            color: var(--text-color);
        }
        .main-content .desc {
            font-size: 12px;
            color: var(--accent-color);
            padding-top: 5px;
        }
        .actions, .fav-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            width: 100%;
            padding: 0 10px;
            gap: 8px;
        }
        .action-box, .fav-actions .item {
            flex: 1;
            background: var(--card-bg);
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 8px;
            min-width: 0;
            transition: background-color 0.3s ease;
        }
        .fav-actions .item {
            flex-direction: row;
            justify-content: center;
            height: 50px;
            gap: 6px;
        }
        .action-box img, .fav-actions img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }
        .action-box span, .fav-actions span {
            font-size: 12px;
            margin-top: 4px;
            color: var(--text-color);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* Style for when favourite is added */
        .favourite-added span {
            color: var(--grey-text) !important;
        }
        .banner {
            margin: 10px;
            border-radius: 8px;
            width: calc(100% - 20px);
            height: 135%;
            background: url('images/toban/tf_success_1.png') no-repeat center/cover;
            transition: filter 0.3s ease;
        }
        .banner-secondary {
            margin: 10px;
            border-radius: 8px;
            width: calc(100% - 20px);
            height: 50px;
            background: url('images/toban/unbanner.png') no-repeat center/cover;
            transition: filter 0.3s ease;
        }
        .action-box, .fav-actions .item {
            cursor: pointer;
        }

        @media (hover: hover) {
            .action-box:hover, .fav-actions .item:hover {
                transform: translateY(-2px);
            }
        }

        /* ---------- Upgrade Modal Styles ---------- */
        .upgrade-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .upgrade-modal {
            max-width: 340px;
            width: 90%;
            background: #FFFFFF;
            border-radius: 28px;
            padding: 32px 24px 28px;
            text-align: center;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.25);
            animation: popIn 0.4s cubic-bezier(0.21, 1.11, 0.38, 1);
            transform-origin: center;
        }
        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .upgrade-modal-exit {
            animation: popOut 0.25s forwards;
        }
        @keyframes popOut {
            0% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
            100% {
                opacity: 0;
                transform: scale(0.9) translateY(10px);
                visibility: hidden;
            }
        }
        .upgrade-icon-wrapper {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        .lock-svg {
            filter: drop-shadow(0 2px 6px rgba(0,184,118,0.2));
            animation: lockPulse 1.2s ease-in-out infinite;
            transform-origin: center;
        }
        @keyframes lockPulse {
            0% {
                transform: scale(1);
                opacity: 0.9;
            }
            50% {
                transform: scale(1.08);
                opacity: 1;
                filter: drop-shadow(0 4px 12px rgba(0,184,118,0.35));
            }
            100% {
                transform: scale(1);
                opacity: 0.9;
            }
        }
        .upgrade-message {
            font-size: 16px;
            line-height: 1.4;
            color: #1F2937;
            margin-bottom: 28px;
            font-weight: 500;
            letter-spacing: -0.2px;
        }
        .upgrade-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .upgrade-btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            background: none;
        }
        .upgrade-btn-dismiss {
            background: #F3F4F6;
            color: #1F2937;
        }
        .upgrade-btn-upgrade {
            background: #00B876;
            color: white;
            box-shadow: 0 2px 8px rgba(0,184,118,0.3);
        }
        .upgrade-btn-upgrade:active {
            background: #009e63;
            transform: scale(0.97);
        }
        @media (max-width: 400px) {
            .upgrade-modal {
                padding: 28px 20px 24px;
            }
            .upgrade-message {
                font-size: 15px;
            }
            .upgrade-btn {
                padding: 10px 0;
                font-size: 14px;
            }
        }

        /* Loader inside upgrade modal */
        .upgrade-loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            z-index: 10001;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .upgrade-loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .upgrade-green-ring {
            position: relative;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #1e9c43;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .upgrade-logo-wrapper {
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background: white;
            box-shadow: 0 4px 0px rgba(0, 0, 0, 0.05);
            animation: pulse-zoom 0.7s ease-in-out infinite;
            z-index: 3;
        }
        .upgrade-logo-image {
            width: 30px;
            height: 30px;
            object-fit: contain;
            border-radius: 50%;
        }
        .upgrade-orbit {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            animation: rotate-dot 1.5s linear infinite;
            transform-origin: center center;
            z-index: 2;
        }
        .upgrade-dot {
            position: absolute;
            top: 28px;
            left: 100%;
            transform: translateX(-1400%);
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 60%;
            box-shadow: 0 0 8px 9px rgba(255, 255, 255, 0.6);
        }
        @keyframes pulse-zoom {
            0% {
                transform: scale(1.03);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.15);
                opacity: 1;
            }
            100% {
                transform: scale(1.03);
                opacity: 0.8;
            }
        }
        @keyframes rotate-dot {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
    </style>
</head>

    <!-- Firebase SDK (module) for adding favourites and fetching tier -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, doc, runTransaction, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAjLxkisBi9pzmjlwdHnYfo25XR2Z6ToEs",
            authDomain: "opay-plus-5802c.firebaseapp.com",
            projectId: "opay-plus-5802c",
            storageBucket: "opay-plus-5802c.firebasestorage.app",
            messagingSenderId: "967061625774",
            appId: "1:967061625774:web:236f88391ccdd9edd2863f",
            measurementId: "G-H0QV81VYBY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserTier = 0; // default tier 0
        let currentUser = null;

        // Get user tier on auth change
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                try {
                    const userRef = doc(db, 'users', user.uid);
                    const userSnap = await getDoc(userRef);
                    if (userSnap.exists()) {
                        const data = userSnap.data();
                        let tier = data.tier !== undefined ? data.tier : 0;
                        if (tier === undefined && data.subscriptionPlan) {
                            const plan = data.subscriptionPlan;
                            if (plan === 'tier1') tier = 1;
                            else if (plan === 'tier2') tier = 2;
                            else if (plan === 'tier3') tier = 3;
                            else tier = 0;
                        }
                        currentUserTier = tier;
                    }
                } catch (err) {
                    console.error('Failed to fetch tier', err);
                }
            } else {
                currentUser = null;
                currentUserTier = 0;
            }
        });

        window.addToFavourites = async function(recipient) {
            const user = auth.currentUser;
            if (!user) {
                // If not logged in, still update localStorage
                updateLocalFavourites(recipient);
                return true;
            }
            try {
                const userRef = doc(db, 'users', user.uid);
                await runTransaction(db, async (transaction) => {
                    const userDoc = await transaction.get(userRef);
                    if (!userDoc.exists()) return;
                    let favs = userDoc.data().favourites || [];
                    // Remove if already exists (same account+bank)
                    favs = favs.filter(f => !(f.accountNumber === recipient.accountnumber && f.bankName === recipient.bankname));
                    // Add to beginning
                    favs.unshift({
                        accountName: recipient.accountname,
                        accountNumber: recipient.accountnumber,
                        bankName: recipient.bankname,
                        url: recipient.url
                    });
                    // Keep only latest 20
                    if (favs.length > 20) favs = favs.slice(0, 20);
                    transaction.update(userRef, { favourites: favs });
                });
                // Also update localStorage cache
                updateLocalFavourites(recipient);
                return true;
            } catch (error) {
                console.error('Error adding favourite:', error);
                return false;
            }
        };

        function updateLocalFavourites(recipient) {
            const stored = localStorage.getItem('transfer.favourites');
            let localFavs = stored ? JSON.parse(stored) : [];
            localFavs = localFavs.filter(f => !(f.accountNumber === recipient.accountnumber && f.bankName === recipient.bankname));
            localFavs.unshift({
                accountName: recipient.accountname,
                accountNumber: recipient.accountnumber,
                bankName: recipient.bankname,
                url: recipient.url
            });
            if (localFavs.length > 20) localFavs = localFavs.slice(0, 20);
            localStorage.setItem('transfer.favourites', JSON.stringify(localFavs));
        }

        // Expose tier globally for non-module scripts
        window.getUserTier = () => currentUserTier;
    </script>

    <script>
        // ---------- Transaction data handling and history saving ----------
        (function() {
            const amountEl = document.getElementById('displayAmount');
            if (!amountEl) return;

            function formatTransactionDate(timestamp) {
                const date = new Date(timestamp);
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                const month = months[date.getMonth()];
                const day = date.getDate();
                const suffix = (day % 10 === 1 && day !== 11) ? 'st' : (day % 10 === 2 && day !== 12) ? 'nd' : (day % 10 === 3 && day !== 13) ? 'rd' : 'th';
                const year = date.getFullYear();
                const hh = String(date.getHours()).padStart(2, '0');
                const min = String(date.getMinutes()).padStart(2, '0');
                const ss = String(date.getSeconds()).padStart(2, '0');
                return `${month} ${day}${suffix}, ${year} ${hh}:${min}:${ss}`;
            }

            function generateTransactionId() {
                const now = new Date();
                const yy = now.getFullYear().toString().slice(-2);
                const mm = String(now.getMonth() + 1).padStart(2, '0');
                const dd = String(now.getDate()).padStart(2, '0');
                const randomPart = Math.floor(Math.random() * 1000000000).toString().padStart(9, '0');
                return `${yy}${mm}${dd}02${randomPart}1`;
            }

            function generateSessionId() {
                const now = new Date();
                const yy = now.getFullYear().toString().slice(-2);
                const mm = String(now.getMonth() + 1).padStart(2, '0');
                const dd = String(now.getDate()).padStart(2, '0');
                const hh = String(now.getHours()).padStart(2, '0');
                const min = String(now.getMinutes()).padStart(2, '0');
                const ss = String(now.getSeconds()).padStart(2, '0');
                const random = Math.floor(Math.random() * 10000000).toString().padStart(7, '0');
                return `100004${yy}${mm}${dd}${hh}${min}${ss}${random}`;
            }

            function formatCurrency(amount) {
                return new Intl.NumberFormat('en-NG', {
                    style: 'currency',
                    currency: 'NGN',
                    minimumFractionDigits: 2
                }).format(amount);
            }

            // Load amount from pending transaction first, then from receipt
            let amountValue = null;
            const txData = localStorage.getItem('transfer.tx.pending');
            if (txData) {
                try {
                    const tx = JSON.parse(txData);
                    if (tx && tx.amount != null) {
                        amountValue = tx.amount;
                        amountEl.textContent = formatCurrency(tx.amount);

                        // Create receipt from pending
                        const now = new Date();
                        const paymentSuccessTime = now.getTime();
                        const processingTime = paymentSuccessTime;
                        const receivedTime = paymentSuccessTime + 15 * 1000;
                        const transactionId = generateTransactionId();
                        const sessionId = generateSessionId();

                        const receipt = {
                            ...tx,
                            paymentSuccessTime,
                            processingTime,
                            receivedTime,
                            transactionId,
                            sessionId
                        };
                        localStorage.setItem('transfer.receipt', JSON.stringify(receipt));
                        localStorage.removeItem('transfer.tx.pending');
                    }
                } catch (e) {
                    console.error('Failed to process transaction data', e);
                }
            }

            if (!amountValue) {
                const receiptData = localStorage.getItem('transfer.receipt');
                if (receiptData) {
                    try {
                        const receipt = JSON.parse(receiptData);
                        if (receipt && receipt.amount != null) {
                            amountValue = receipt.amount;
                            amountEl.textContent = formatCurrency(receipt.amount);
                        }
                    } catch (e) {
                        console.error('Failed to parse receipt', e);
                    }
                }
            }

            // If still no amount, try to get the most recent sent transaction from history
            if (!amountValue) {
                try {
                    const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
                    const recentSent = transactions.find(tx => tx.type === 'sent');
                    if (recentSent && recentSent.amount != null) {
                        amountEl.textContent = formatCurrency(recentSent.amount);
                    } else {
                        amountEl.textContent = '';
                    }
                } catch (e) {
                    console.error('Failed to load transactions', e);
                }
            }

            // Replace the current history entry with dashboard, so that pressing back from this page
            // goes to dashboard instead of the previous page.
            history.replaceState(null, '', 'dashboardful.html');
        })();

        // ----- Upgrade Modal logic -----
        const upgradeOverlay = document.getElementById('upgradeModalOverlay');
        const upgradeModal = document.getElementById('upgradeModal');
        const upgradeDismiss = document.getElementById('upgradeDismissBtn');
        const upgradeAction = document.getElementById('upgradeActionBtn');
        const upgradeLoader = document.getElementById('upgradeLoaderOverlay');

        function showUpgradeModal() {
            if (!upgradeOverlay) return;
            upgradeOverlay.style.display = 'flex';
            if (upgradeModal) upgradeModal.classList.remove('upgrade-modal-exit');
        }

        function hideUpgradeModal() {
            if (!upgradeModal) return;
            upgradeModal.classList.add('upgrade-modal-exit');
            upgradeModal.addEventListener('animationend', function handler() {
                upgradeModal.removeEventListener('animationend', handler);
                if (upgradeOverlay) upgradeOverlay.style.display = 'none';
                upgradeModal.classList.remove('upgrade-modal-exit');
            });
        }

        function showLoader() {
            if (upgradeLoader) upgradeLoader.style.display = 'flex';
        }

        function hideLoader() {
            if (upgradeLoader) upgradeLoader.style.display = 'none';
        }

        if (upgradeDismiss) {
            upgradeDismiss.addEventListener('click', () => hideUpgradeModal());
        }

        if (upgradeAction) {
            upgradeAction.addEventListener('click', () => {
                showLoader();
                setTimeout(() => {
                    window.open('/upgrade-subscribe.html', '_blank');
                    hideLoader();
                    hideUpgradeModal();
                }, 800);
            });
        }

        if (upgradeOverlay) {
            upgradeOverlay.addEventListener('click', (e) => {
                if (e.target === upgradeOverlay) hideUpgradeModal();
            });
        }

        // ----- Modified action handlers with tier check -----
        function handleShareReceipt() {
            const tier = window.getUserTier ? window.getUserTier() : 0;
            if (tier === 0) {
                showUpgradeModal();
                return;
            }
            // Proceed with original share receipt
            const receiptData = localStorage.getItem('transfer.receipt');
            if (receiptData) {
                try {
                    localStorage.setItem('shareReceiptData', receiptData);
                    window.location.href = 'sign-receipt.html';
                } catch (e) {
                    alert('Unable to share receipt.');
                }
            } else {
                alert('Receipt data not found.');
            }
        }

        function handleAddToFavorites() {
            const tier = window.getUserTier ? window.getUserTier() : 0;
            if (tier === 0) {
                showUpgradeModal();
                return;
            }
            // Original add to favourites
            const favouriteBox = document.getElementById('favourite-box');
            const span = favouriteBox.querySelector('span');
            if (span.textContent === 'Favourites Added') return;

            const receiptData = localStorage.getItem('transfer.receipt');
            if (!receiptData) {
                console.warn('No transaction data to add to favourites');
                return;
            }
            try {
                const tx = JSON.parse(receiptData);
                const recipient = {
                    accountname: tx.accountname,
                    accountnumber: tx.accountnumber,
                    bankname: tx.bankname,
                    url: tx.url
                };
                if (window.addToFavourites) {
                    window.addToFavourites(recipient).then(success => {
                        if (success) {
                            const img = favouriteBox.querySelector('img');
                            img.src = 'images/trans/favourite.png';
                            img.alt = 'Favourites Added';
                            span.textContent = 'Favourites Added';
                            favouriteBox.classList.add('favourite-added');
                        } else {
                            console.warn('Failed to add favourite');
                        }
                    });
                } else {
                    console.warn('Favourites function not available');
                }
            } catch (e) {
                console.error(e);
            }
        }

        function handleViewDetails() {
            const receiptData = localStorage.getItem('transfer.receipt');
            if (receiptData) {
                try {
                    const receipt = JSON.parse(receiptData);
                    const bankName = (receipt.bankname || '').toLowerCase();
                    if (bankName === 'opay') {
                        window.location.href = 'opaytransucces.html';
                    } else {
                        window.location.href = 'transucc1.html';
                    }
                } catch (e) {
                    window.location.href = 'transucc1.html';
                }
            } else {
                window.location.href = 'transucc1.html';
            }
        }

        // Attach event listeners
        document.getElementById('shareReceiptBtn').addEventListener('click', handleShareReceipt);
        document.getElementById('favourite-box').addEventListener('click', handleAddToFavorites);
        document.getElementById('viewDetailsBtn').addEventListener('click', handleViewDetails);

        document.addEventListener("contextmenu", function(e){ e.preventDefault(); });
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if (e.ctrlKey && (e.keyCode == 'U'.charCodeAt(0))) return false;
        }
    </script>
    <script src="/pwa-check.js"></script>
    <script src="/network-popup.js"></script>
</body>
