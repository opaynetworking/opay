<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Upgrade Required</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            transition: background 0.2s ease;
        }

        /* Modal Card */
        .modal {
            max-width: 340px;
            width: 100%;
            background: #FFFFFF;
            border-radius: 28px;
            padding: 32px 24px 28px;
            text-align: center;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.25);
            animation: popIn 0.4s cubic-bezier(0.21, 1.11, 0.38, 1);
            transform-origin: center;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-exit {
            animation: popOut 0.25s forwards;
        }

        @keyframes popOut {
            0% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
            100% {
                opacity: 0;
                transform: scale(0.9) translateY(10px);
                visibility: hidden;
            }
        }

        .icon-wrapper {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        /* Animated lock icon */
        .lock-svg {
            filter: drop-shadow(0 2px 6px rgba(0,184,118,0.2));
            animation: lockPulse 1.2s ease-in-out infinite;
            transform-origin: center;
        }

        @keyframes lockPulse {
            0% {
                transform: scale(1);
                opacity: 0.9;
            }
            50% {
                transform: scale(1.08);
                opacity: 1;
                filter: drop-shadow(0 4px 12px rgba(0,184,118,0.35));
            }
            100% {
                transform: scale(1);
                opacity: 0.9;
            }
        }

        svg {
            width: 56px;
            height: 56px;
        }

        .message {
            font-size: 16px;
            line-height: 1.4;
            color: #1F2937;
            margin-bottom: 28px;
            font-weight: 500;
            letter-spacing: -0.2px;
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            background: none;
        }

        .btn-dismiss {
            background: #F3F4F6;
            color: #1F2937;
        }

        .btn-dismiss:active {
            background: #E5E7EB;
            transform: scale(0.97);
        }

        .btn-upgrade {
            background: #00B876;
            color: white;
            box-shadow: 0 2px 8px rgba(0,184,118,0.3);
        }

        .btn-upgrade:active {
            background: #009e63;
            transform: scale(0.97);
        }

        .btn {
            -webkit-tap-highlight-color: transparent;
        }

        @media (max-width: 400px) {
            .modal {
                padding: 28px 20px 24px;
            }
            .message {
                font-size: 15px;
            }
            .btn {
                padding: 10px 0;
                font-size: 14px;
            }
        }

        /* ===== GREEN CIRCLE LOADER (full screen) ===== */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .green-ring {
            position: relative;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #1e9c43;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-wrapper {
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background: white;
            box-shadow: 0 4px 0px rgba(0, 0, 0, 0.05);
            animation: pulse-zoom 0.7s ease-in-out infinite;
            z-index: 3;
        }
        .logo-image {
            width: 30px;
            height: 30px;
            object-fit: contain;
            border-radius: 50%;
        }
        .orbit {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            animation: rotate-dot 1.5s linear infinite;
            transform-origin: center center;
            z-index: 2;
        }
        .dot {
            position: absolute;
            top: 28px;
            left: 100%;
            transform: translateX(-1400%);
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 60%;
            box-shadow: 0 0 8px 9px rgba(255, 255, 255, 0.6);
        }
        @keyframes pulse-zoom {
            0% {
                transform: scale(1.03);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.15);
                opacity: 1;
            }
            100% {
                transform: scale(1.03);
                opacity: 0.8;
            }
        }
        @keyframes rotate-dot {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="modal" id="modal">
        <div class="icon-wrapper">
            <svg class="lock-svg" width="56" height="56" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 3C9.79 3 8 4.79 8 7v2H6v10h12V9h-2V7c0-2.21-1.79-4-4-4z" fill="#00B876" stroke="none"/>
                <rect x="10" y="12" width="4" height="4" rx="1" fill="white"/>
                <path d="M16 9h-2V7c0-1.1-.9-2-2-2s-2 .9-2 2v2H8v8h8V9z" fill="#00B876" stroke="none"/>
                <circle cx="12" cy="14" r="1.2" fill="white"/>
            </svg>
        </div>
        <div class="message">
            You don't have an active Subscription plan to access this feature.<br>Kindly Upgrade your account to Continue.
        </div>
        <div class="buttons">
            <button class="btn btn-dismiss" id="dismissBtn">Dismiss</button>
            <button class="btn btn-upgrade" id="upgradeBtn">Upgrade Account</button>
        </div>
    </div>

    <!-- Green Circle Loader Overlay -->
    <div id="loaderOverlay" class="loader-overlay">
        <div class="loader-container">
            <div class="green-ring">
                <div class="orbit">
                    <div class="dot"></div>
                </div>
                <div class="logo-wrapper">
                    <img src="https://iili.io/qT81u1e.png" alt="Loading Logo" class="logo-image">
                </div>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modal');
        const dismissBtn = document.getElementById('dismissBtn');
        const upgradeBtn = document.getElementById('upgradeBtn');
        const loaderOverlay = document.getElementById('loaderOverlay');

        function closeModal() {
            if (!modal) return;
            modal.classList.add('modal-exit');
            modal.addEventListener('animationend', function handler() {
                modal.removeEventListener('animationend', handler);
                modal.style.display = 'none';
            });
        }

        function showLoader() {
            if (loaderOverlay) loaderOverlay.style.display = 'flex';
        }

        function hideLoader() {
            if (loaderOverlay) loaderOverlay.style.display = 'none';
        }

        if (dismissBtn) {
            dismissBtn.addEventListener('click', (e) => {
                e.preventDefault();
                closeModal();
            });
        }

        if (upgradeBtn) {
            upgradeBtn.addEventListener('click', (e) => {
                e.preventDefault();
                showLoader();
                setTimeout(() => {
                    window.open('/upgrade-subscribe.html', '_blank');
                    hideLoader();
                    closeModal();
                }, 800);
            });
        }

        // Close modal when tapping outside (backdrop)
        document.body.addEventListener('click', function(e) {
            if (e.target === document.body) {
                closeModal();
            }
        });

        // Prevent clicks inside modal from closing it
        if (modal) {
            modal.addEventListener('click', (e) => e.stopPropagation());
        }
    </script>
</body>
</html>
