        // Helper: format date like "Jun 01,2026 15:34"
        function formatNotificationDate(timestamp) {
            if (!timestamp) return 'Unknown';
            let date;
            if (timestamp.toDate) date = timestamp.toDate();
            else if (timestamp.seconds) date = new Date(timestamp.seconds * 1000);
            else date = new Date(timestamp);
            
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const month = months[date.getMonth()];
            const day = date.getDate().toString().padStart(2, '0');
            const year = date.getFullYear();
            let hours = date.getHours();
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            return `${month} ${day},${year} ${hours}:${minutes} ${ampm}`;
        }
        
        function formatTransactionDate(timestamp) {
            if (!timestamp) return 'Unknown';
            const date = new Date(timestamp);
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const month = months[date.getMonth()];
            const day = date.getDate();
            const suffix = (day % 10 === 1 && day !== 11) ? 'st' : (day % 10 === 2 && day !== 12) ? 'nd' : (day % 10 === 3 && day !== 13) ? 'rd' : 'th';
            const hh = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            return `${month} ${day}${suffix}, ${hh}:${min}`;
        }
        
        // Escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ======================== DEFAULT WELCOME MESSAGE ========================
        async function ensureDefaultWelcomeMessage(uid) {
            if (defaultMessageAdded) return;
            try {
                const messagesRef = collection(db, 'users', uid, 'messages');
                const q = query(messagesRef, orderBy('timestamp', 'desc'));
                const snapshot = await getDocs(q);
                if (snapshot.empty) {
                    await addDoc(messagesRef, {
                        subject: "Welcome to Opay Plus",
                        body: "Welcome to Opay Plus Tools, No.1 Fake transfer Opay clone app, with advance server protocol to complete and Verify transaction using Opay Backend validation. \n\nTo Enjoy 😊 Full package of opay plus App and to successful complete transfer to local banks and POS machine, Upgrade your account. \n\nOpay Plus.",
                        from: "Opay Plus",
                        fromUid: "system",
                        timestamp: serverTimestamp(),
                        read: false
                    });
                    defaultMessageAdded = true;
                    console.log("Default welcome message added for user:", uid);
                }
            } catch (err) {
                console.error("Error adding default message:", err);
            }

        // ======================== UPGRADE MODAL ========================
        function showUpgradeModal() {
            const overlay = document.getElementById('upgradeModalOverlay');
            if (overlay) overlay.style.display = 'flex';
            const modal = document.getElementById('upgradeModal');
            if (modal) modal.classList.remove('upgrade-modal-exit');
        }
        
        function hideUpgradeModal() {
            const modal = document.getElementById('upgradeModal');
            const overlay = document.getElementById('upgradeModalOverlay');
            if (!modal) return;
            modal.classList.add('upgrade-modal-exit');
            modal.addEventListener('animationend', function handler() {
                modal.removeEventListener('animationend', handler);
                if (overlay) overlay.style.display = 'none';
                if (modal) modal.classList.remove('upgrade-modal-exit');
            });
        }
        
        function showLoader() {
            const loader = document.getElementById('upgradeLoaderOverlay');
            if (loader) loader.style.display = 'flex';
        }
        
        function hideLoader() {
            const loader = document.getElementById('upgradeLoaderOverlay');
            if (loader) loader.style.display = 'none';
        }
        
        function initUpgradeModal() {
            const dismissBtn = document.getElementById('upgradeDismissBtn');
            const upgradeBtn = document.getElementById('upgradeActionBtn');
            const overlay = document.getElementById('upgradeModalOverlay');
            if (dismissBtn) dismissBtn.addEventListener('click', () => hideUpgradeModal());
            if (upgradeBtn) {
                upgradeBtn.addEventListener('click', () => {
                    showLoader();
                    setTimeout(() => {
                        window.open('/upgrade-subscribe.html', '_blank');
                        hideLoader();
                        hideUpgradeModal();
                    }, 800);
                });
            }
            if (overlay) overlay.addEventListener('click', (e) => { if (e.target === overlay) hideUpgradeModal(); });
        }
        
        // ======================== USER TIER FETCH ========================
        async function fetchUserTier(uid) {
            try {
                const userRef = doc(db, 'users', uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    const data = userSnap.data();
                    let tier = data.tier;
                    if (tier === undefined && data.subscriptionPlan) {
                        const plan = data.subscriptionPlan;
                        if (plan === 'tier1') tier = 1;
                        else if (plan === 'tier2') tier = 2;
                        else if (plan === 'tier3') tier = 3;
                        else tier = 0;
                    } else if (tier === undefined) tier = 0;
                    currentUserTier = tier;
                    localStorage.setItem('tier', `tier${tier}`);
                    return tier;
                }
                return 0;
            } catch (err) {
                console.error("Error fetching tier:", err);
                return 0;
            }
        }
        
        // ======================== ADMIN MESSAGES (Activities) with Link Support ========================
        function cacheAdminMessages(messages) {
            try {
                localStorage.setItem('cached_admin_messages', JSON.stringify(messages));
                localStorage.setItem('cached_admin_messages_time', Date.now().toString());
            } catch(e) { console.warn(e); }
        }
        
        function loadCachedAdminMessages() {
            try {
                const cached = localStorage.getItem('cached_admin_messages');
                const cachedTime = localStorage.getItem('cached_admin_messages_time');
                if (cached && cachedTime) {
                    const age = Date.now() - parseInt(cachedTime);
                    if (age < 5 * 60 * 1000) {
                        return JSON.parse(cached);
                    }
                }
            } catch(e) {}
            return null;
        }
        
        async function markMessageAsRead(messageId) {
            if (!currentUserId) return;
            try {
                const msgRef = doc(db, 'users', currentUserId, 'messages', messageId);
                await updateDoc(msgRef, { read: true });
            } catch (err) {
                console.error("Mark read error:", err);
            }
        }
        
        // MODIFIED: Display modal with optional link button
        function showMessageModal(message) {
            const existingModal = document.querySelector('.message-modal');
            if (existingModal) existingModal.remove();
            
            const hasLink = message.link && message.link.trim() !== '';
            const linkHtml = hasLink ? `
                <div class="modal-link-wrapper">
                    <a href="${escapeHtml(message.link)}" target="_blank" rel="noopener noreferrer" class="modal-link-btn">
                        <i class="fas fa-external-link-alt"></i> Open Link
                    </a>
                </div>
            ` : '';
            
            const modal = document.createElement('div');
            modal.className = 'message-modal';
            modal.innerHTML = `
                <div class="modal-overlay"></div>
                <div class="modal-container">
                    <div class="modal-header">
                        <h3>${escapeHtml(message.subject || 'Notification')}</h3>
                        <button class="modal-close-btn">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="modal-meta">
                            <span><i class="modal-icon">📨</i> From: Opayplus@service.com</span>
                            <span><i class="modal-icon">⏱️</i> ${formatNotificationDate(message.timestamp)}</span>
                        </div>
                        <div class="modal-content-text">${escapeHtml(message.body || '(No additional content)')}</div>
                        ${linkHtml}
                    </div>
                    <div class="modal-footer">
                        <button class="modal-close-footer">Close</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            const closeModal = () => modal.remove();
            modal.querySelectorAll('.modal-close-btn, .modal-close-footer, .modal-overlay').forEach(el => {
                el.addEventListener('click', closeModal);
            });
            
            if (!message.read) {
                markMessageAsRead(message.id);
                message.read = true;
                if (document.querySelector('.tab.active')?.id === 'activitiesTab') {
                    renderActivitiesMessages(allMessages);
                }
                updateUnreadBadge();
            }
        }
        
        // MODIFIED: Add link indicator in notification card preview
        function renderActivitiesMessages(messages) {
            if (!notificationsList) return;
            
            if (!messages || messages.length === 0) {
                notificationsList.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px; background: #fff; border-radius: 16px; margin-top: 20px;">
                        <span style="font-size: 48px;">📭</span>
                        <p style="color: #666; margin-top: 12px;">No messages yet</p>
                        <p style="color: #999; font-size: 13px;">When admin sends a message, it will appear here</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            messages.forEach(msg => {
                const isUnread = !msg.read;
                const timestampFormatted = formatNotificationDate(msg.timestamp);
                const subject = escapeHtml(msg.subject || 'Notification');
                const bodyPreview = escapeHtml(msg.body?.substring(0, 100) || '');
                const hasMore = (msg.body?.length || 0) > 100;
                const displayBody = bodyPreview + (hasMore ? '...' : '');
                const hasLink = msg.link && msg.link.trim() !== '';
                const linkIcon = hasLink ? '<i class="fas fa-link" style="margin-left: 6px; font-size: 12px; color: #0AA83F;"></i>' : '';
                
                html += `
                    <div class="notification-card" data-msg-id="${msg.id}" data-unread="${isUnread}">
                        <div class="notification-header">
                            <div class="notification-icon ${isUnread ? 'unread' : ''}"></div>
                            <h3 class="notification-title">${subject} ${linkIcon}</h3>
                        </div>
                        <p class="notification-body">${displayBody || 'Click to view full message'}</p>
                        <div class="notification-footer">
                            <span class="timestamp">${timestampFormatted}</span>
                            <button class="view-link" data-id="${msg.id}">
                                View
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            });
            
            notificationsList.innerHTML = html;
            
            document.querySelectorAll('.notification-card').forEach(card => {
                const msgId = card.getAttribute('data-msg-id');
                const message = messages.find(m => m.id === msgId);
                if (!message) return;
                
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.view-link')) return;
                    showMessageModal(message);
                });
                
                const viewBtn = card.querySelector('.view-link');
                if (viewBtn) {
                    viewBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        showMessageModal(message);
                    });
                }
            });
        }
        
        function updateUnreadBadge() {
            if (!activitiesBadge) return;
            const unreadCount = allMessages.filter(m => !m.read).length;
            if (unreadCount > 0) {
                activitiesBadge.textContent = unreadCount > 99 ? '99+' : unreadCount;
                activitiesBadge.style.display = 'inline-block';
            } else {
                activitiesBadge.style.display = 'none';
            }
        }
        
        function subscribeToUserMessages(uid) {
            if (unsubscribeMessages) unsubscribeMessages();
            const messagesRef = collection(db, 'users', uid, 'messages');
            const q = query(messagesRef, orderBy('timestamp', 'desc'));
            
            const cached = loadCachedAdminMessages();
            if (cached) {
                allMessages = cached;
                updateUnreadBadge();
                if (document.querySelector('.tab.active')?.id === 'activitiesTab') {
                    renderActivitiesMessages(allMessages);
                }
            }
            
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const messages = [];
                snapshot.forEach(docSnap => {
                    messages.push({
                        id: docSnap.id,
                        ...docSnap.data()
                    });
                });
                allMessages = messages;
                cacheAdminMessages(messages);
                updateUnreadBadge();
                const activeTab = document.querySelector('.tab.active');
                if (activeTab && activeTab.id === 'activitiesTab') {
                    renderActivitiesMessages(messages);
                }
            }, (error) => {
                console.error("Snapshot error:", error);
                if (document.querySelector('.tab.active')?.id === 'activitiesTab') {
                    if (allMessages.length === 0) {
                        notificationsList.innerHTML = `<div style="padding: 40px; text-align: center; color: red;">Failed to load messages. Using cached data if available.</div>`;
                    }
                }
            });
        }
        
        // ======================== TRANSACTION HISTORY (Transactions Tab) with Tier Check ========================
        function getTransactionIcon(tx) {
            const isIncoming = (tx.type === 'received' || tx.category === 'deposit' || tx.category === 'owealth' || tx.category === 'bonus');
            return isIncoming ? 'images/history/downtrs.png' : 'images/history/uptrs.png';
        }
        
        function cacheTransactions(transactions) {
            try {
                localStorage.setItem('cached_transactions', JSON.stringify(transactions));
                localStorage.setItem('cached_transactions_time', Date.now().toString());
            } catch(e) {}
        }
        
        function loadCachedTransactions() {
            try {
                const cached = localStorage.getItem('cached_transactions');
                const cachedTime = localStorage.getItem('cached_transactions_time');
                if (cached && cachedTime) {
                    const age = Date.now() - parseInt(cachedTime);
                    if (age < 5 * 60 * 1000) {
                        return JSON.parse(cached);
                    }
                }
            } catch(e) {}
            return null;
        }
        
        function navigateToTransactionDetail(tx) {
            if (!tx) return;
            localStorage.setItem('viewTransaction', JSON.stringify(tx));
            const bankName = (tx.bankname || '').toLowerCase();
            const category = tx.category || '';
            if (category === 'fee') {
                window.location.href = 'stamp-dutysucc.html';
            } else if (category === 'deposit' || category === 'received' || tx.type === 'received') {
                window.location.href = 'trans-from.html';
            } else if (bankName === 'opay') {
                window.location.href = 'opayreceipt-view.html';
            } else {
                window.location.href = 'receipt-view.html';
            }
        }
        
        function renderTransactionsTabContent(transactions) {
            if (!notificationsList) return;
            
            if (!transactions || transactions.length === 0) {
                notificationsList.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px; background: #fff; border-radius: 16px; margin-top: 20px;">
                        <span style="font-size: 48px;">💰</span>
                        <p style="color: #666; margin-top: 12px;">No transactions yet</p>
                        <p style="color: #999; font-size: 13px;">Your transaction history will appear here</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            let totalIn = 0, totalOut = 0;
            transactions.forEach(tx => {
                const amount = tx.amount || 0;
                const isIncoming = (tx.type === 'received' || tx.category === 'deposit' || tx.category === 'owealth' || tx.category === 'bonus');
                if (isIncoming) totalIn += amount;
                else totalOut += amount;
            });
            
            html += `
                <div class="tx-summary" style="background: #f8f9fa; border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;">
                    <div style="display: flex; justify-content: space-between;">
                        <span>In: <strong style="color:#00C896;">₦${totalIn.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}</strong></span>
                        <span>Out: <strong>₦${totalOut.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}</strong></span>
                    </div>
                </div>
            `;
            
            transactions.forEach((tx, idx) => {
                const iconImg = getTransactionIcon(tx);
                const dateStr = tx.date1 || formatTransactionDate(tx.created_at || Date.now());
                const amount = tx.amount || 0;
                const isIncoming = (tx.type === 'received' || tx.category === 'deposit' || tx.category === 'owealth' || tx.category === 'bonus');
                const amountClass = isIncoming ? 'amount-positive' : 'amount-negative';
                const displayAmount = (isIncoming ? '+' : '-') + '₦' + amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                
                let title = '';
                if (tx.category === 'money') {
                    title = (isIncoming ? 'Transfer from ' : 'Transfer to ') + (tx.accountname || 'Unknown');
                } else if (tx.category === 'airtime') {
                    title = 'Airtime';
                } else if (tx.category === 'data') {
                    title = 'Mobile data';
                } else if (tx.category === 'fee') {
                    title = 'Stamp Duty';
                } else if (tx.category === 'owealth') {
                    title = 'Owealth Interest Earned';
                } else if (tx.category === 'deposit') {
                    title = 'Transfer from ' + (tx.accountname || 'Bank');
                } else {
                    title = tx.accountname || 'Transaction';
                }
                
                html += `
                    <div class="notification-card tx-card" data-tx-index="${idx}">
                        <div class="notification-header">
                            <div class="icon-box">
                                <img src="${iconImg}" alt="icon" onerror="this.style.display='none'">
                            </div>
                            <h3 class="notification-title">${escapeHtml(title)}</h3>
                        </div>
                        <p class="notification-body tx-amount ${amountClass}" style="font-size: 18px; font-weight: 600;">${displayAmount}</p>
                        <div class="notification-footer">
                            <span class="timestamp">${dateStr}</span>
                            <button class="view-link tx-view-btn" data-idx="${idx}">
                                View
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            });
            
            notificationsList.innerHTML = html;
            
            document.querySelectorAll('.tx-card').forEach(card => {
                const idx = card.getAttribute('data-tx-index');
                const tx = transactions[parseInt(idx)];
                if (!tx) return;
                
                const handleView = (e) => {
                    e.stopPropagation();
                    if (currentUserTier === 0) {
                        showUpgradeModal();
                    } else {
                        navigateToTransactionDetail(tx);
                    }
                };
                
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.tx-view-btn')) return;
                    handleView(e);
                });
                
                const viewBtn = card.querySelector('.tx-view-btn');
                if (viewBtn) {
                    viewBtn.addEventListener('click', handleView);
                }
            });
        }
        
        async function loadTransactionsFromFirestore(uid) {
            try {
                const userRef = doc(db, 'users', uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    const data = userSnap.data();
                    const lastActivity = data.lastActivity || Date.now();
                    const now = Date.now();
                    const twoWeeks = 14 * 24 * 60 * 60 * 1000;
                    
                    let txs = data.transactions || [];
                    if (now - lastActivity > twoWeeks) {
                        await updateDoc(userRef, { transactions: [], lastActivity: now });
                        txs = [];
                    } else {
                        await updateDoc(userRef, { lastActivity: now });
                    }
                    transactionList = txs;
                    cacheTransactions(transactionList);
                    if (document.querySelector('.tab.active')?.id === 'transactionsTab') {
                        renderTransactionsTabContent(transactionList);
                    }
                    updateTransactionsBadge();
                } else {
                    transactionList = [];
                    cacheTransactions([]);
                    if (document.querySelector('.tab.active')?.id === 'transactionsTab') {
                        renderTransactionsTabContent([]);
                    }
                }
            } catch (err) {
                console.error("Error loading transactions:", err);
                const cached = loadCachedTransactions();
                if (cached) {
                    transactionList = cached;
                    if (document.querySelector('.tab.active')?.id === 'transactionsTab') {
                        renderTransactionsTabContent(transactionList);
                    }
                } else {
                    if (document.querySelector('.tab.active')?.id === 'transactionsTab') {
                        renderTransactionsTabContent([]);
                    }
                }
            }
        }
        
        function updateTransactionsBadge() {
            if (!transactionsBadge) return;
            const count = transactionList.length;
            if (count > 0) {
                transactionsBadge.textContent = count > 99 ? '99+' : count;
                transactionsBadge.style.display = 'inline-block';
            } else {
                transactionsBadge.style.display = 'none';
            }
        }

        // ======================== Tab Switching Logic ========================
        async function switchTab(selectedTab) {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            selectedTab.classList.add('active');
            
            if (selectedTab.id === 'activitiesTab') {
                renderActivitiesMessages(allMessages);
            } else if (selectedTab.id === 'transactionsTab') {
                if (transactionList.length === 0) {
                    const cached = loadCachedTransactions();
                    if (cached) {
                        transactionList = cached;
                        renderTransactionsTabContent(transactionList);
                    } else if (currentUserId) {
                        await loadTransactionsFromFirestore(currentUserId);
                    } else {
                        renderTransactionsTabContent([]);
                    }
                } else {
                    renderTransactionsTabContent(transactionList);
                }
            } else if (selectedTab.id === 'servicesTab') {
                renderServicesTabContent();
            }
        }
        
        window.switchTab = switchTab;
        window.goBack = () => window.history.length > 1 ? window.history.back() : window.location.href = 'index.html';
        window.signOutUser = async () => {
            await signOut(auth);
            window.location.href = 'create-email.html';
        };
        
        if (menuBtn) {
            menuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const existingMenu = document.querySelector('.signout-popup');
                if (existingMenu) existingMenu.remove();
                
                const popup = document.createElement('div');
                popup.className = 'signout-popup';
                popup.innerHTML = `

                        <button class="signout-btn">Sign Out</button>
                        <button class="cancel-btn">Cancel</button>
                    </div>
                `;
                document.body.appendChild(popup);

                    await signOut(auth);
                    window.location.href = 'create-email.html';
                });
                popup.querySelector('.cancel-btn').addEventListener('click', () => popup.remove());
                document.addEventListener('click', function closePopup(e) {
                    if (!popup.contains(e.target) && e.target !== menuBtn) {
                        popup.remove();
                        document.removeEventListener('click', closePopup);
                    }
                });
            });
        }
        
        // Auth state listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                await fetchUserTier(currentUserId);
                await ensureDefaultWelcomeMessage(currentUserId);
                subscribeToUserMessages(currentUserId);
                await loadTransactionsFromFirestore(currentUserId);
                const defaultTab = document.getElementById('activitiesTab');

                window.location.href = 'create-email.html';

        });
