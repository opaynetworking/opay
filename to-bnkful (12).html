        /* ===== original styles ===== */
        :root {
            --bg-color: #F8F8FB;
            --text-color: #000000;

            --header-bg: #FFFFFF;
            --border-color: #eeeeee;
            --secondary-text: #bdbdbd;
            --accent-color: #00b876;
            --free-transfer-bg: #F6EDFF;
            --free-transfer-text: #4527a0;
            --free-count-color: #673ab7;
            --placeholder-color: #e0e0e0;
            --event-bg: #FFFFFF;
            --event-border: #f5f5f5;
            --empty-state-color: #9e9e9e;
            --tab-inactive: #000000;
            --network-monitor-bg: #FFFFFF;
            --error-bg: #fee2e2;
            --error-color: #dc2626;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #e0e0e0;
                --card-bg: #1e1e1e;
                --header-bg: #1e1e1e;

                --secondary-text: #757575;

                --event-bg: #1e1e1e;
                --event-border: #333333;
                --empty-state-color: #757575;
                --tab-inactive: #b0b0b0;
                --network-monitor-bg: #2d2d2d;

                --error-color: #f87171;

            -webkit-tap-highlight-color: transparent;

        body {

            color: var(--text-color);

        .container {

        .header {

        .slider-container {

            overflow: hidden;
            position: relative;

            justify-content: center;

        /* Loader overlay – covers the whole screen */
.loader {
    display: none;               /* Hidden by default */
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999;
    justify-content: center;
    align-items: center;
    background: rgba(0, 0, 0, 0.5);
}

/* Container for the animated ring */
.loader-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* Solid green circle (full disc) */
.green-ring {
    position: relative;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background-color: #1e9c43;    /* OPay green – fills the whole circle */
    border: none;                 /* No border – the solid background creates the ring */
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
 /*   box-shadow: 0 0 2px 0px rgba(255, 255, 255, 0.85),*/
              /*  0 0 20px 2px rgba(255, 255, 255, 0.4);*/
}

/* White background with pulsing logo – sits in the center */
.logo-wrapper {
    width: 35px;
    height: 35px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    background: white;
    box-shadow: 0 4px 0px rgba(0, 0, 0, 0.05);
    animation: pulse-zoom 0.7s ease-in-out infinite;
    z-index: 3;                   /* Above the rotating dot */
}

.logo-image {
    width: 25px;
    height: 25px;
    object-fit: contain;
    border-radius: 50%;
}

/* Rotating orbit that carries the glowing dot */
.orbit {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    animation: rotate-dot 1.5s linear infinite;
    transform-origin: center center;
    z-index: 2;                   /* Behind the white logo, so dot appears on the green ring */
}

/* The small glowing dot that travels around the ring */
.dot {
    position: absolute;
    top: 25px;                    /* Just outside the green circle */
    left: 100%;
    transform: translateX(-1300%); /* Moves to the very top edge */
    width: 1px;
    height: 1px;
    background: white;
    border-radius: 60%;
    box-shadow: 0 0 8px 9px rgba(255, 255, 255, 0.5);
}

/* Pulsing animation for the inner logo */
@keyframes pulse-zoom {
    0% {
        transform: scale(1.03);
        opacity: 0.8;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }
    50% {
        transform: scale(1.15);
        opacity: 1;
        box-shadow: 0 10px 20px rgba(5, 150, 105, 0.15);
    }
    100% {
        transform: scale(1.03);
        opacity: 0.8;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }
}

/* Rotation animation for the dot */
@keyframes rotate-dot {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}

        /* Tab container for recents & favourites */
        .tab-container {

        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }
    </style>

            measurementId: "G-H0QV81VYBY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Expose functions for non-module script
        window.fbAuth = auth;
        window.fbDb = db;

        // Show/hide loader
        function showLoader(show) {
            const loader = document.getElementById('loadingPopup');
            if (loader) loader.style.display = show ? 'flex' : 'none';
        }
        window.showLoader = showLoader;

        // Helper to reset daily free count if needed
        async function getFreeTransferCount(user) {
            const userRef = doc(db, 'users', user.uid);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) return 3; // default
            const data = userSnap.data();
            const lastReset = data.lastFreeReset ? new Date(data.lastFreeReset) : null;
            const today = new Date();
            if (!lastReset || lastReset.toDateString() !== today.toDateString()) {
                // new day, reset to 3
                await updateDoc(userRef, {
                    freeTransferCount: 3,
                    lastFreeReset: today.toISOString()
                });
                return 3;
            }
            return data.freeTransferCount || 3;
        }

        // Load recent list from Firestore
        async function loadRecentFromFirestore(user) {
            try {
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    const data = userSnap.data();
                    const recent = data.recentTransfers || [];
                    // Update localStorage as cache
                    localStorage.setItem('transfer.recentList', JSON.stringify(recent));
                    return recent;
                }
                return [];
            } catch (e) {
                console.error('Error loading recent from Firestore', e);
                return [];
            }
        }

        // Load favourites from Firestore
        async function loadFavouritesFromFirestore(user) {
            try {
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    const data = userSnap.data();
                    const favs = data.favourites || [];
                    localStorage.setItem('transfer.favourites', JSON.stringify(favs));
                    return favs;
                }
                return [];
            } catch (e) {
                console.error('Error loading favourites', e);
                return [];
            }
        }

        // Pass functions to non-module script
        window.getFreeTransferCount = getFreeTransferCount;
        window.loadRecentFromFirestore = loadRecentFromFirestore;
        window.loadFavouritesFromFirestore = loadFavouritesFromFirestore;
    </script>

    <!-- Non‑module script (original logic + Firestore integration) -->
    <script>
        (function() {
            document.addEventListener("contextmenu", e => e.preventDefault());
            document.onkeydown = function(e) {
                if (e.keyCode == 123) return false;
                if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
                if (e.ctrlKey && (e.keyCode == 'U'.charCodeAt(0))) return false;
            };

            // Slider logic (unchanged)
            const slider = document.getElementById('slider');
            let currentSlide = 0;
            const slides = document.querySelectorAll('.slide');
            const totalSlides = slides.length;
            let imagesLoaded = 0;
            const slideImages = document.querySelectorAll('.slide img');
            function imageLoaded() {
                imagesLoaded++;
                if (imagesLoaded === totalSlides) {
                    setInterval(nextSlide, 5000);
                }
            }
            slideImages.forEach(img => {
                if (img.complete) imageLoaded();
                else {
                    img.addEventListener('load', imageLoaded);
                    img.addEventListener('error', imageLoaded);
                }
            });
            if (imagesLoaded === totalSlides) setInterval(nextSlide, 5000);
            function nextSlide() {
                currentSlide = (currentSlide + 1) % totalSlides;
                slider.style.transform = `translateX(-${currentSlide * 100}%)`;
            }

            // DOM elements
            const backBtn = document.getElementById('backBtn');
            const bankSelector = document.getElementById('bankSelector');
            const bankLogoContainer = document.getElementById('bankLogoContainer');
            const bankLogo = document.getElementById('bankLogo');
            const bankNameDiv = document.getElementById('bankName');
            const accountInput = document.getElementById('accountNumber');
            const detectBar = document.getElementById('detectBar');
            const detectText = document.getElementById('detectText');
            const nextBtn = document.getElementById('nextBtn');
            const networkMonitor = document.getElementById('networkMonitor');
            const freeCountSpan = document.getElementById('freeCount');

            const tabButtons = document.querySelectorAll('.tab-button');
            const recentsPane = document.getElementById('recents-pane');
            const favouritesPane = document.getElementById('favourites-pane');

            let selectedBank = null;
            let resolvedAccountName = '';
            let resolveTimeout = null;
            let currentUser = null;

            const PAYSTACK_SECRET_KEY = 'sk_live_39d0c456073e23d027ffaab48dfae856fadf04c1';

            // Load recent list from localStorage (cache)
            function loadRecentList() {
                try {
                    const stored = localStorage.getItem('transfer.recentList');
                    return stored ? JSON.parse(stored) : [];
                } catch (e) {
                    return [];
                }
            }

            // Load favourites from localStorage
            function loadFavouritesList() {
                try {
                    const stored = localStorage.getItem('transfer.favourites');
                    return stored ? JSON.parse(stored) : [];
                } catch (e) {
                    return [];
                }
            }

            // Render recent items (max 3)
            function renderRecentList() {
                const container = recentsPane;
                container.innerHTML = '';
                const items = loadRecentList();
                const displayItems = items.slice(0, 3);
                if (displayItems.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>No recent transactions</p></div>';
                    return;
                }
                displayItems.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'b-item';
                    div.setAttribute('data-accountnumber', item.accountNumber);
                    div.setAttribute('data-bankname', item.bankName);
                    div.setAttribute('data-accountname', item.accountName);
                    div.setAttribute('data-url', item.url);
                    div.innerHTML = `
                        <div class="b-left">
                            <span class="b-name">${item.accountName}</span>
                            <span class="b-sub">${item.accountNumber} ${item.bankName}</span>
                        </div>
                        <div class="b-avatar">
                            <img src="${item.url}" alt="Profile Image">
                        </div>
                    `;
                    div.addEventListener('click', () => {
                        const payload = {
                            accountname: item.accountName,
                            accountnumber: item.accountNumber,
                            bankname: item.bankName,
                            url: item.url
                        };
                        localStorage.setItem('transfer.selected', JSON.stringify(payload));
                        window.location.href = 'nextfulls.html';
                    });
                    container.appendChild(div);
                });
                // View All link
                if (items.length > 3) {
                    const viewAll = document.createElement('a');
                    viewAll.href = 'recent.html';
                    viewAll.className = 'view-all';
                    viewAll.textContent = 'View All ›';
                    container.appendChild(viewAll);
                }
            }

            // Render favourite items (max 3)
            function renderFavouritesList() {
                const container = favouritesPane;
                container.innerHTML = '';
                const items = loadFavouritesList();
                const displayItems = items.slice(0, 3);
                if (displayItems.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>No favourites yet</p></div>';
                    return;
                }
                displayItems.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'b-item';
                    div.setAttribute('data-accountnumber', item.accountNumber);
                    div.setAttribute('data-bankname', item.bankName);
                    div.setAttribute('data-accountname', item.accountName);
                    div.setAttribute('data-url', item.url);
                    div.innerHTML = `
                        <div class="b-left">
                            <span class="b-name">${item.accountName}</span>
                            <span class="b-sub">${item.accountNumber} ${item.bankName}</span>
                        </div>
                        <div class="b-avatar">
                            <img src="${item.url}" alt="Profile Image">
                        </div>
                    `;
                    div.addEventListener('click', () => {
                        const payload = {
                            accountname: item.accountName,
                            accountnumber: item.accountNumber,
                            bankname: item.bankName,
                            url: item.url
                        };
                        localStorage.setItem('transfer.selected', JSON.stringify(payload));
                        window.location.href = 'nextfulls.html';
                    });
                    container.appendChild(div);
                });
                // View All link
                if (items.length > 3) {
                    const viewAll = document.createElement('a');
                    viewAll.href = 'favorite.html';
                    viewAll.className = 'view-all';
                    viewAll.textContent = 'View All ›';
                    container.appendChild(viewAll);
                }
            }

            // Tab switching
            tabButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    tabButtons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const tab = this.getAttribute('data-tab');
                    if (tab === 'recents') {
                        recentsPane.classList.add('active');
                        favouritesPane.classList.remove('active');
                    } else {
                        favouritesPane.classList.add('active');
                        recentsPane.classList.remove('active');
                    }
                });
            });

            // Load saved account number from sessionStorage
            function loadSavedAccountNumber() {
                const saved = sessionStorage.getItem('tempAccountNumber');
                if (saved) {
                    accountInput.value = saved;
                    sessionStorage.removeItem('tempAccountNumber');
                }
            }

            function saveAccountNumber() {
                const accNum = accountInput.value.trim();
                if (accNum) sessionStorage.setItem('tempAccountNumber', accNum);
            }

            // Load selected bank from sessionStorage
            function loadSelectedBank() {
                const temp = sessionStorage.getItem('tempSelectedBank');
                if (temp) {
                    try {
                        const bank = JSON.parse(temp);
                        if (bank.name) {
                            selectedBank = bank;
                            updateBankUI();
                            const accNum = accountInput.value.trim();
                            if (accNum.length === 10) setTimeout(() => handleAccountInput(), 100);
                        }
                    } catch (e) {}
                    sessionStorage.removeItem('tempSelectedBank');
                } else {
                    selectedBank = null;
                    updateBankUI();
                }
            }

            function updateBankUI() {
                if (selectedBank && selectedBank.name) {
                    bankNameDiv.textContent = selectedBank.name;
                    bankNameDiv.classList.add('selected');
                    if (selectedBank.logo) {
                        bankLogo.src = selectedBank.logo;
                        bankLogoContainer.classList.remove('hidden');
                        bankLogo.onerror = function() {
                            this.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(selectedBank.name)}&background=00b876&color=fff&length=2&size=128`;
                            bankLogoContainer.classList.remove('hidden');
                        };
                    } else {
                        bankLogo.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(selectedBank.name)}&background=00b876&color=fff&length=2&size=128`;
                        bankLogoContainer.classList.remove('hidden');
                    }
                } else {
                    bankNameDiv.textContent = 'Select Bank';
                    bankNameDiv.classList.remove('selected');
                    bankLogoContainer.classList.add('hidden');
                    bankLogo.src = '';
                }
            }

            function resetDetection() {
                detectBar.style.display = 'none';
                detectBar.classList.remove('success', 'loading', 'error');
                detectText.textContent = '';
                nextBtn.disabled = true;
                nextBtn.classList.remove('enabled', 'with-detection');
                resolvedAccountName = '';
            }

            function showLoading() {
                detectBar.style.display = 'flex';
                detectBar.classList.add('loading');
                detectBar.classList.remove('success', 'error');
                detectText.textContent = 'Verifying account details';
                nextBtn.classList.add('with-detection');
            }

            function showSuccess(accountName) {
                detectBar.style.display = 'flex';
                detectBar.classList.remove('loading', 'error');
                detectBar.classList.add('success');
                detectText.textContent = accountName;
                resolvedAccountName = accountName;
                nextBtn.disabled = false;
                nextBtn.classList.add('enabled', 'with-detection');
            }

            function showError(message) {
                detectBar.style.display = 'flex';
                detectBar.classList.remove('loading', 'success');
                detectBar.classList.add('error');
                detectText.textContent = message;
                nextBtn.disabled = true;
                nextBtn.classList.remove('enabled');
                nextBtn.classList.add('with-detection');
                resolvedAccountName = '';
            }

            async function resolveAccount() {
                const accNum = accountInput.value.trim();
                if (!selectedBank) {
                    showError('Please select a bank');
                    return;
                }
                if (accNum.length !== 10) {
                    showError('Account number must be 10 digits');
                    return;
                }

                // Check recent list first
                const recentList = loadRecentList();
                const match = recentList.find(item => 
                    item.accountNumber === accNum && 
                    item.bankName.toLowerCase() === selectedBank.name.toLowerCase()
                );
                if (match) {
                    showSuccess(match.accountName);
                    return;
                }

                if (!selectedBank.code) {
                    showError('Account unavailable - Recipient\'s KYC verification incomplete');
                    return;
                }

                showLoading();
                try {
                    const url = `https://api.paystack.co/bank/resolve?account_number=${accNum}&bank_code=${selectedBank.code}`;
                    const response = await fetch(url, {
                        headers: { 'Authorization': `Bearer ${PAYSTACK_SECRET_KEY}` }
                    });
                    const data = await response.json();
                    if (data.status) {
                        showSuccess(data.data.account_name);
                    } else {
                        showError('Account unavailable - Recipient\'s KYC verification incomplete');
                    }
                } catch (error) {
                    console.error(error);
                    showError('Network error. Please try again.');
                }
            }

            function handleAccountInput() {
                if (resolveTimeout) clearTimeout(resolveTimeout);
                const accNum = accountInput.value.trim();
                if (selectedBank && accNum.length === 10) {
                    resolveTimeout = setTimeout(resolveAccount, 800);
                } else {
                    resetDetection();
                }
            }

            accountInput.addEventListener('input', handleAccountInput);

            // Bank selector click – go to bank list page
            bankSelector.addEventListener('click', (e) => {
                e.preventDefault();
                saveAccountNumber();
                window.showLoader(true);
                setTimeout(() => {
                    window.showLoader(false);
                    window.location.href = 'bnk-liat fulll.html';
                }, 5000);
            });

            networkMonitor.addEventListener('click', (e) => {
                e.preventDefault();
                window.showLoader(true);
                setTimeout(() => {
                    window.showLoader(false);
                    window.location.href = '/transuccessrate.html';
                }, 5000);
            });

            // Next button – proceed to amount page, passing free count and bank type
            nextBtn.addEventListener('click', async () => {
                if (!nextBtn.disabled && nextBtn.classList.contains('enabled')) {
                    // Get current free count (if user logged in, else use localStorage fallback)
                    let freeCount = 3;
                    if (currentUser && window.getFreeTransferCount) {
                        freeCount = await window.getFreeTransferCount(currentUser);
                        freeCountSpan.textContent = freeCount;
                    } else {
                        freeCount = parseInt(localStorage.getItem('freeTransferCount') || '3');
                    }
                    const isOpay = selectedBank.name.toLowerCase().includes('opay');
                    const payload = {
                        accountname: resolvedAccountName,
                        accountnumber: accountInput.value.trim(),
                        bankname: selectedBank.name,
                        url: selectedBank.logo || `https://ui-avatars.com/api/?name=${encodeURIComponent(selectedBank.name)}&background=00b876&color=fff&length=2&size=128`,
                        freeCount: freeCount,
                        isOpay: isOpay
                    };
                    localStorage.setItem('transfer.selected', JSON.stringify(payload));
                    window.showLoader(true);
                    setTimeout(() => {
                        window.showLoader(false);
                        window.location.href = 'nextfulls.html';
                    }, 3000);
                }
            });

            backBtn.addEventListener('click', () => {
                window.history.back();
            });

            // Initialize with Firestore data if user logged in
            (async function init() {
                if (window.fbAuth) {
                    window.fbAuth.onAuthStateChanged(async (user) => {
                        if (user) {
                            currentUser = user;
                            // Load recent list from Firestore and update localStorage
                            const recent = await window.loadRecentFromFirestore(user);
                            localStorage.setItem('transfer.recentList', JSON.stringify(recent));
                            // Load favourites from Firestore
                            const favs = await window.loadFavouritesFromFirestore(user);
                            localStorage.setItem('transfer.favourites', JSON.stringify(favs));
                            // Update displays
                            renderRecentList();
                            renderFavouritesList();
                            // Update free count display
                            const free = await window.getFreeTransferCount(user);
                            freeCountSpan.textContent = free;
                        } else {
                            // No user – use localStorage fallback
                            renderRecentList();
                            renderFavouritesList();
                            const free = localStorage.getItem('freeTransferCount');
                            freeCountSpan.textContent = free ? parseInt(free) : 3;
                        }
                    });
                } else {
                    renderRecentList();
                    renderFavouritesList();
                    const free = localStorage.getItem('freeTransferCount');
                    freeCountSpan.textContent = free ? parseInt(free) : 3;
                }
            })();

            // Load saved account number and bank after Firestore init
            loadSavedAccountNumber();
            loadSelectedBank();
            resetDetection();
        })();
    </script>
