<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favourites · OPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .mobile-container {
            width: 100%;
            max-width: 414px;
            background-color: #ffffff;
            height: 100vh;
            max-height: 900px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        @media (min-width: 420px) {
            .mobile-container {
                height: 90vh;
                border-radius: 24px;
                border: 8px solid #bdbdbd;
            }
        }

        .search-input:focus {
            outline: none;
            background-color: #ffffff;
            box-shadow: 0 0 0 2px #e5e7eb;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .beneficiary-item {
            transition: background-color 0.2s;
            padding: 0.75rem 1rem;
        }
        .beneficiary-item:active {
            background-color: #f9fafb;
        }
        .beneficiary-item h3 {
            font-size: 0.9375rem;
            line-height: 1.4;
        }
        .beneficiary-item p {
            font-size: 0.8125rem;
            color: #6b7280;
        }
        .beneficiary-item .logo-container {
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            margin-right: 0.75rem;
            background-color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .beneficiary-item .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Loading spinner */
        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: #10b981;
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <!-- Header with back button -->
        <div class="px-4 pt-5 pb-1 flex items-center">
            <button class="p-1 -ml-2 text-gray-800 hover:bg-gray-100 rounded-full transition" id="backBtn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <h1 class="text-lg font-semibold ml-2 text-gray-900">Favourites</h1>
        </div>

        <!-- Search -->
        <div class="px-4 py-2">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" id="searchInput" class="search-input block w-full pl-9 pr-3 py-2.5 border-none rounded-xl bg-gray-50 text-gray-900 placeholder-gray-400 text-sm focus:outline-none focus:bg-white transition duration-200" placeholder="Account number or name">
            </div>
        </div>

        <!-- List Content -->
        <div class="flex-1 overflow-y-auto scrollbar-hide pb-20" id="scrollContainer">
            <div id="favourites-list" class="mt-1">
                <!-- Items injected by JS -->
            </div>
            
            <!-- Loading spinner (hidden by default) -->
            <div id="loading-spinner" class="loading-spinner hidden"></div>

            <!-- Empty State -->
            <div id="empty-state" class="hidden flex flex-col items-center justify-center mt-16 text-gray-400">
                <svg class="w-14 h-14 mb-3 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <p class="text-sm">No favourites yet</p>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Load favourites from localStorage
            function loadFavouritesList() {
                try {
                    const stored = localStorage.getItem('transfer.favourites');
                    return stored ? JSON.parse(stored) : [];
                } catch (e) {
                    console.error('Failed to load favourites', e);
                    return [];
                }
            }

            let allItems = loadFavouritesList();
            
            // Pagination state
            const itemsPerPage = 12;
            let currentPage = 1;
            let isLoading = false;
            let hasMore = true;

            const listContainer = document.getElementById('favourites-list');
            const emptyState = document.getElementById('empty-state');
            const searchInput = document.getElementById('searchInput');
            const scrollContainer = document.getElementById('scrollContainer');
            const spinner = document.getElementById('loading-spinner');
            const backBtn = document.getElementById('backBtn');

            // Fallback avatar
            function getFallbackUrl(bankName) {
                return `https://ui-avatars.com/api/?name=${encodeURIComponent(bankName || 'Bank')}&background=10b981&color=fff&length=2&size=128`;
            }

            // When a beneficiary is clicked, save to localStorage and go to transfer page
            function selectBeneficiary(item) {
                const payload = {
                    accountname: item.accountName || item.name,
                    accountnumber: item.accountNumber || item.account,
                    bankname: item.bankName || item.bank,
                    url: item.url || getFallbackUrl(item.bankName || item.bank)
                };
                localStorage.setItem('transfer.selected', JSON.stringify(payload));
                sessionStorage.setItem('fromRecent', 'true');
                window.location.href = 'to-bnkful.html';
            }

            // Render a single item element
            function createItemElement(item) {
                const itemEl = document.createElement('div');
                itemEl.className = 'beneficiary-item flex items-center border-b border-gray-50 cursor-pointer';
                itemEl.onclick = () => selectBeneficiary(item);

                const displayName = item.accountName || item.name || 'Unknown';
                const displayAccount = item.accountNumber || item.account || '';
                const displayBank = item.bankName || item.bank || '';
                const logoUrl = item.url || getFallbackUrl(displayBank);

                itemEl.innerHTML = `
                    <div class="logo-container">
                        <img src="${logoUrl}" alt="${displayBank}" onerror="this.onerror=null; this.src='${getFallbackUrl(displayBank)}';">
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="text-gray-900 font-medium truncate">${displayName}</h3>
                        <p class="text-gray-500 truncate">${displayAccount} ${displayBank}</p>
                    </div>
                    <div class="ml-2 flex-shrink-0">
                        <button class="text-gray-400 hover:text-gray-600 p-1.5 rounded-full hover:bg-gray-100 transition" onclick="event.stopPropagation(); showOptions('${displayName}')">
                            <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z" />
                            </svg>
                        </button>
                    </div>
                `;
                return itemEl;
            }

            // Get filtered items based on search
            function getFilteredItems() {
                const searchTerm = searchInput.value.toLowerCase().trim();
                if (!searchTerm) return allItems;
                return allItems.filter(item => {
                    const name = (item.accountName || item.name || '').toLowerCase();
                    const account = (item.accountNumber || item.account || '').toLowerCase();
                    const bank = (item.bankName || item.bank || '').toLowerCase();
                    return name.includes(searchTerm) || account.includes(searchTerm) || bank.includes(searchTerm);
                });
            }

            // Render paginated list
            function renderPage(reset = false) {
                if (reset) {
                    currentPage = 1;
                    hasMore = true;
                    listContainer.innerHTML = '';
                }

                const filtered = getFilteredItems();
                const start = (currentPage - 1) * itemsPerPage;
                const end = start + itemsPerPage;
                const pageItems = filtered.slice(start, end);

                if (pageItems.length === 0) {
                    if (currentPage === 1) {
                        emptyState.classList.remove('hidden');
                    }
                    hasMore = false;
                    spinner.classList.add('hidden');
                    return;
                }

                emptyState.classList.add('hidden');
                
                pageItems.forEach(item => {
                    listContainer.appendChild(createItemElement(item));
                });

                // Check if there are more items to load
                hasMore = end < filtered.length;
                if (!hasMore) {
                    spinner.classList.add('hidden');
                }
            }

            // Load more items on scroll
            function checkScroll() {
                if (isLoading || !hasMore) return;
                const container = scrollContainer;
                const scrollTop = container.scrollTop;
                const scrollHeight = container.scrollHeight;
                const clientHeight = container.clientHeight;
                
                if (scrollHeight - scrollTop <= clientHeight + 50) { // near bottom
                    isLoading = true;
                    spinner.classList.remove('hidden');
                    currentPage++;
                    // Simulate async load to show spinner
                    setTimeout(() => {
                        renderPage();
                        isLoading = false;
                    }, 300);
                }
            }

            // Debounced scroll handler
            let scrollTimeout;
            scrollContainer.addEventListener('scroll', () => {
                if (scrollTimeout) clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(checkScroll, 100);
            });

            // Search input handler
            searchInput.addEventListener('input', () => {
                // Reset pagination and re-render from first page
                currentPage = 1;
                hasMore = true;
                listContainer.innerHTML = '';
                renderPage();
                // Reset scroll position to top
                scrollContainer.scrollTop = 0;
            });

            window.showOptions = function(name) {
                const action = confirm(`Actions for ${name}:\n\nOK to Edit\nCancel to Delete`);
                if (action) {
                    alert(`Editing ${name}...`);
                } else {
                    alert(`Deleting ${name}...`);
                }
            };

            backBtn.addEventListener('click', () => window.history.back());

            // Initial render
            renderPage();

            // Re-fetch allItems when returning to page (in case of new favourites)
            window.addEventListener('focus', () => {
                allItems = loadFavouritesList();
                currentPage = 1;
                hasMore = true;
                listContainer.innerHTML = '';
                renderPage();
            });
        })();
    </script>
       <script src="/pwa-check.js"></script>
       <script src="/network-popup.js"></script>
</body>
</html>
